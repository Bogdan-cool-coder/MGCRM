# Dev stack — full local development environment (one-command startup).
#
# USAGE:
#   docker compose -f docker-compose.dev.yml up -d
#
# Services started:
#   db        — postgres:16-alpine  (port 5432)
#   redis     — redis:7-alpine      (port 6379)
#   app       — php-fpm 8.5 with bind-mount ./src (live code, dev-deps installed)
#   nginx     — proxies /api → app:9000, serves Laravel public/
#   frontend  — Vite dev server (port 5173), proxies /api → nginx:80
#
# Key differences from docker-compose.yml (prod):
#   - app: bind-mounts ./src so changes are live without rebuild
#   - app: composer install --dev (includes Pint, PHPUnit, Pail)
#   - app: opcache.validate_timestamps=1 (reloads changed files)
#   - frontend: runs `vite` (HMR) instead of a static nginx build
#   - No gotenberg, queue-worker on startup — start them manually when needed:
#       docker compose -f docker-compose.dev.yml up -d queue-worker gotenberg
#
# After first start run migrations + seed (wait ~30s for composer install to finish):
#   docker compose -f docker-compose.dev.yml exec app php artisan migrate --force
#   docker compose -f docker-compose.dev.yml exec app php artisan db:seed --force
#
# Run tests (sqlite :memory:, never touches the live db):
#   docker compose -f docker-compose.dev.yml exec app php artisan test

networks:
  macro-crm-dev:
    driver: bridge

services:

  # ---------------------------------------------------------------------------
  # Postgres 16 — primary datastore.
  # Service name matches src/.env DB_HOST=postgres so no env override needed.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-macro-crm}-db-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-macro_crm}
      POSTGRES_USER: ${DB_USERNAME:-macro_crm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - macro-crm-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-macro_crm} -d ${DB_DATABASE:-macro_crm}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis 7 — queue + cache backend
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-macro-crm}-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - macro-crm-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # App (PHP-FPM 8.5) — bind-mount of ./src for live code, dev-deps installed.
  #
  # The prod Dockerfile bakes code into the image (--no-dev vendor).
  # For dev we mount ./src directly and install ALL composer deps (including
  # Pint, PHPUnit, Pail) so `docker compose exec app ...` works out of the box.
  #
  # opcache.validate_timestamps=1 ensures PHP picks up changes on each request
  # without a container restart (at the cost of a small stat overhead — fine for dev).
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.dev
    image: macro-crm-app-dev:latest
    container_name: ${COMPOSE_PROJECT_NAME:-macro-crm}-app-dev
    restart: unless-stopped
    env_file:
      - src/.env
    environment:
      # Override prod-baked opcache setting: validate file timestamps in dev
      # so changed PHP files are picked up without container restart.
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: "1"
    volumes:
      # Bind-mount: live source (no rebuild on code change)
      - ./src:/var/www/html
      # Named volume for storage so it persists across bind-mount resets
      - storage_app_dev:/var/www/html/storage/app
      - storage_framework_dev:/var/www/html/storage/framework
      - storage_logs_dev:/var/www/html/storage/logs
      # vendor/ in a named volume: survives host `src/vendor` git-ignored dir
      # and avoids macOS performance hit from bind-mounting node_modules-sized dirs.
      - vendor_dev:/var/www/html/vendor
      # bootstrap/cache in a volume so artisan optimize runs persist
      - bootstrap_cache_dev:/var/www/html/bootstrap/cache
    networks:
      - macro-crm-dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Nginx — serves Laravel public/ and proxies PHP to app:9000.
  # Reuses the same config as prod (docker/nginx/default.conf).
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: ${COMPOSE_PROJECT_NAME:-macro-crm}-nginx-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Bind-mount public/ so nginx can serve favicon, robots.txt etc. from live source
      - ./src/public:/var/www/html/public:ro
    networks:
      - macro-crm-dev
    depends_on:
      - app

  # ---------------------------------------------------------------------------
  # Frontend — Vite HMR dev server.
  # Proxies /api requests to nginx:80 (configured in front/vite.config.ts).
  # Access the SPA at http://localhost:5173
  # ---------------------------------------------------------------------------
  frontend:
    image: node:22-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-macro-crm}-frontend-dev
    restart: unless-stopped
    working_dir: /app
    # install if node_modules is missing/stale, then start vite with --host so
    # the dev server binds to 0.0.0.0 and is reachable from the host.
    command: sh -c "npm ci && npm run dev -- --host"
    environment:
      # Enable chokidar polling so Vite detects file changes from macOS host
      # bind-mounts on colima/virtiofs where inotify events are not delivered.
      # 300 ms interval is set in vite.config.ts when this flag is present.
      CHOKIDAR_USEPOLLING: "1"
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:5173"
    volumes:
      # Bind-mount front/ so file changes trigger HMR without rebuild
      - ./front:/app
      # node_modules in a named volume: avoids macOS host-filesystem slowness
      # and macOS/Linux uid mismatch on the bind mount.
      - node_modules_dev:/app/node_modules
    networks:
      - macro-crm-dev
    depends_on:
      - nginx

  # ---------------------------------------------------------------------------
  # Queue worker — optional, start manually when needed:
  #   docker compose -f docker-compose.dev.yml up -d queue-worker
  # ---------------------------------------------------------------------------
  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.dev
    image: macro-crm-app-dev:latest
    container_name: ${COMPOSE_PROJECT_NAME:-macro-crm}-queue-dev
    command: php artisan queue:work --queue=default --tries=1 --timeout=600 --max-jobs=50 --memory=256 --sleep=1
    restart: unless-stopped
    profiles:
      - worker
    env_file:
      - src/.env
    volumes:
      - ./src:/var/www/html
      - storage_app_dev:/var/www/html/storage/app
      - storage_framework_dev:/var/www/html/storage/framework
      - storage_logs_dev:/var/www/html/storage/logs
      - vendor_dev:/var/www/html/vendor
      - bootstrap_cache_dev:/var/www/html/bootstrap/cache
    networks:
      - macro-crm-dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Telegram bot (S2.9) — long-polling, SINGLE process. Optional profile `bot`:
  #   docker compose -f docker-compose.dev.yml --profile bot up -d bot
  #
  # NEVER scale this service (parallel getUpdates → Telegram 409 Conflict).
  # RUN_TELEGRAM_POLLING=true is set ONLY here; app/queue do not poll.
  # nutgram:listen (auto-reload) can be substituted for nutgram:run in dev.
  # ---------------------------------------------------------------------------
  bot:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.dev
    image: macro-crm-app-dev:latest
    container_name: ${COMPOSE_PROJECT_NAME:-macro-crm}-bot-dev
    command: php artisan nutgram:run
    restart: unless-stopped
    profiles:
      - bot
    env_file:
      - src/.env
    environment:
      RUN_TELEGRAM_POLLING: "true"
    volumes:
      - ./src:/var/www/html
      - storage_app_dev:/var/www/html/storage/app
      - storage_framework_dev:/var/www/html/storage/framework
      - storage_logs_dev:/var/www/html/storage/logs
      - vendor_dev:/var/www/html/vendor
      - bootstrap_cache_dev:/var/www/html/bootstrap/cache
    networks:
      - macro-crm-dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Gotenberg — PDF generation. Optional, start manually when needed:
  #   docker compose -f docker-compose.dev.yml up -d gotenberg
  # ---------------------------------------------------------------------------
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: ${COMPOSE_PROJECT_NAME:-macro-crm}-gotenberg-dev
    restart: unless-stopped
    profiles:
      - gotenberg
    networks:
      - macro-crm-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  redis_dev_data:
  storage_app_dev:
  storage_framework_dev:
  storage_logs_dev:
  bootstrap_cache_dev:
  vendor_dev:
  node_modules_dev:
