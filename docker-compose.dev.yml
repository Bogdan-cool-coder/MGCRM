# Dev datastores only. Spin up Postgres + Redis for local development while
# running artisan/composer through the throwaway composer:latest image (no app
# image build needed during early milestones).
#
#   docker compose -f docker-compose.dev.yml up -d db redis
#
# App/nginx/queue come from the full prod compose (docker-compose.yml) once the
# image is wired up. Until then, develop against these two services.

services:
  db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-macro-crm}-db-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-macro_crm}
      POSTGRES_USER: ${DB_USERNAME:-macro_crm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-macro_crm} -d ${DB_DATABASE:-macro_crm}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-macro-crm}-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  pgdata:
  redis_dev_data:
