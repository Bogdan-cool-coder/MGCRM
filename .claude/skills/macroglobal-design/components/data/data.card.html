<!-- @dsCard group="Components" viewport="700x300" name="Data — Tag, Badge, Avatar, Card" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="https://unpkg.com/primeicons@7.0.0/primeicons.css" />
<style>
  body { margin: 0; font-family: var(--mg-font-sans); background: var(--mg-surface-page); color: var(--mg-text-primary); }
  .wrap { padding: 22px; display: flex; flex-direction: column; gap: 18px; }
  .grp { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .cap { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--mg-text-muted); font-weight: 600; width: 100%; margin-bottom: -4px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Tag, Badge, Avatar, Card, Button } = window.MACROGlobalCRMDesignSystem_2f42e6;
  function Demo() {
    return (
      <div className="wrap">
        <div className="grp">
          <span className="cap">Tags / status</span>
          <Tag severity="success" icon="pi-verified">Активен</Tag>
          <Tag severity="danger">Просрочено</Tag>
          <Tag severity="warning">Нет задачи</Tag>
          <Tag severity="info">Новый лид</Tag>
          <Tag severity="primary">Договор</Tag>
          <Tag severity="secondary">Физлицо</Tag>
          <Tag severity="success" solid>Won</Tag>
        </div>
        <div className="grp">
          <span className="cap">Badges</span>
          <span style={{position:'relative',display:'inline-flex',alignItems:'center',gap:'6px'}}><i className="pi pi-bell" style={{fontSize:'18px'}}></i><Badge value={20} /></span>
          <Badge value={3} variant="danger" />
          <Badge value="99+" variant="primary" />
          <span style={{display:'inline-flex',alignItems:'center',gap:'5px'}}><Badge dot variant="danger" /> просрочка</span>
        </div>
        <div className="grp">
          <span className="cap">Avatars</span>
          <Avatar name="Иван Петров" size="lg" />
          <Avatar name="Анна Сидорова" />
          <Avatar name="MG" size="sm" color="var(--mg-stage-pink)" />
          <Avatar name="Договор" square color="var(--mg-stage-teal)" />
        </div>
        <div className="grp">
          <Card title="Сводка по сделке" icon="pi-briefcase" actions={<Button variant="secondary" text icon="pi-ellipsis-h" />} style={{width:'320px'}}>
            <div style={{fontSize:'13px',color:'var(--mg-text-secondary)'}}>ООО «Ромашка» — внедрение CRM</div>
            <div style={{marginTop:'8px',fontWeight:700,color:'var(--mg-primary-900)'}}>1 200 000 ₽</div>
          </Card>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
