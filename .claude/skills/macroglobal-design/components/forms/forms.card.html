<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="https://unpkg.com/primeicons@7.0.0/primeicons.css" />
<style>
  body { margin: 0; font-family: var(--mg-font-sans); background: var(--mg-surface-card); color: var(--mg-text-primary); }
  .wrap { padding: 22px; display: flex; flex-direction: column; gap: 18px; }
  .grp { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .cap { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--mg-text-muted); font-weight: 600; width: 100%; margin-bottom: -4px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, Input, Select, Checkbox } = window.MACROGlobalCRMDesignSystem_2f42e6;
  function Demo() {
    const [chk, setChk] = React.useState(true);
    return (
      <div className="wrap">
        <div className="grp">
          <span className="cap">Buttons</span>
          <Button variant="primary" icon="pi-plus">Создать сделку</Button>
          <Button variant="secondary" outlined icon="pi-search">Поиск и фильтр</Button>
          <Button variant="primary" text>Сбросить</Button>
          <Button variant="danger" text icon="pi-trash">Удалить</Button>
          <Button variant="primary" loading>Загрузка</Button>
          <Button variant="primary" disabled>Недоступно</Button>
        </div>
        <div className="grp">
          <span className="cap">Sizes</span>
          <Button size="sm" variant="primary">Small</Button>
          <Button size="md" variant="primary">Medium</Button>
          <Button size="lg" variant="primary">Large</Button>
        </div>
        <div className="grp">
          <span className="cap">Inputs &amp; Select</span>
          <Input icon="pi-search" placeholder="Поиск по названию" />
          <Input value="ООО «Ромашка»" />
          <Input invalid placeholder="Обязательное поле" />
          <Select placeholder="Ответственный" />
          <Select value="Москва" open />
        </div>
        <div className="grp">
          <span className="cap">Checkbox</span>
          <Checkbox checked={chk} label="Только мои сделки" onChange={setChk} />
          <Checkbox checked={false} label="Архивные" onChange={()=>{}} />
          <Checkbox checked disabled label="Заблокировано" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
