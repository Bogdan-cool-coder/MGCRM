<!-- @dsCard group="Brand" viewport="700x170" name="Iconography" subtitle="PrimeIcons в приложении · Bootstrap Icons в брендбуке" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://unpkg.com/primeicons@7.0.0/primeicons.css" />
<style>
  body { margin: 0; font-family: var(--mg-font-sans); background: var(--mg-surface-card); color: var(--mg-text-primary); }
  .wrap { padding: 18px 22px; }
  .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 14px 6px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .ic i { font-size: 19px; color: var(--mg-primary-900); }
  .ic span { font-size: 8px; color: var(--mg-text-muted); }
  .note { font-size: 11px; color: var(--mg-text-muted); margin-top: 14px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="grid">
      <div class="ic"><i class="pi pi-home"></i><span>home</span></div>
      <div class="ic"><i class="pi pi-users"></i><span>users</span></div>
      <div class="ic"><i class="pi pi-briefcase"></i><span>briefcase</span></div>
      <div class="ic"><i class="pi pi-check-square"></i><span>tasks</span></div>
      <div class="ic"><i class="pi pi-id-card"></i><span>id-card</span></div>
      <div class="ic"><i class="pi pi-building"></i><span>building</span></div>
      <div class="ic"><i class="pi pi-box"></i><span>box</span></div>
      <div class="ic"><i class="pi pi-file-edit"></i><span>file</span></div>
      <div class="ic"><i class="pi pi-phone"></i><span>call</span></div>
      <div class="ic"><i class="pi pi-calendar"></i><span>meeting</span></div>
      <div class="ic"><i class="pi pi-clock"></i><span>clock</span></div>
      <div class="ic"><i class="pi pi-plus"></i><span>add</span></div>
      <div class="ic"><i class="pi pi-search"></i><span>search</span></div>
      <div class="ic"><i class="pi pi-filter"></i><span>filter</span></div>
      <div class="ic"><i class="pi pi-th-large"></i><span>board</span></div>
      <div class="ic"><i class="pi pi-list"></i><span>list</span></div>
      <div class="ic"><i class="pi pi-ellipsis-h"></i><span>more</span></div>
      <div class="ic"><i class="pi pi-bell"></i><span>notify</span></div>
      <div class="ic"><i class="pi pi-cog"></i><span>settings</span></div>
      <div class="ic"><i class="pi pi-download"></i><span>export</span></div>
      <div class="ic"><i class="pi pi-pencil"></i><span>edit</span></div>
      <div class="ic"><i class="pi pi-trash"></i><span>delete</span></div>
      <div class="ic"><i class="pi pi-verified"></i><span>active</span></div>
      <div class="ic"><i class="pi pi-chart-bar"></i><span>chart</span></div>
    </div>
    <div class="note">Outline-стиль, ~18px, тонкая обводка. Тон — primary navy. Эмодзи не используются.</div>
  </div>
</body>
</html>
