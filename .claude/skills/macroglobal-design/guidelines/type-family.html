<!-- @dsCard group="Type" viewport="700x180" name="Typeface" subtitle="SF UI Display → Inter (web). Roboto для документов" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--mg-font-sans); background: var(--mg-surface-card); color: var(--mg-text-primary); }
  .wrap { padding: 20px 22px; }
  .big { font-size: 46px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
  .sub { font-size: 12px; color: var(--mg-text-muted); margin-top: 4px; }
  .weights { display: flex; gap: 18px; margin-top: 16px; align-items: baseline; }
  .w { font-size: 20px; }
  .wl { font-size: 10px; color: var(--mg-text-muted); display: block; font-weight: 400; }
  .docs { margin-top: 14px; font-family: var(--mg-font-docs); font-size: 13px; color: var(--mg-text-secondary); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="big">Аа Bb 123</div>
    <div class="sub">Inter — фактический веб-шрифт CRM (фолбэк SF UI Display)</div>
    <div class="weights">
      <span class="w" style="font-weight:400">Regular<span class="wl">400</span></span>
      <span class="w" style="font-weight:500">Medium<span class="wl">500</span></span>
      <span class="w" style="font-weight:600">Semibold<span class="wl">600</span></span>
      <span class="w" style="font-weight:700">Bold<span class="wl">700</span></span>
    </div>
    <div class="docs">Roboto — дополнительный шрифт для официальных документов MACRO Global.</div>
  </div>
</body>
</html>
