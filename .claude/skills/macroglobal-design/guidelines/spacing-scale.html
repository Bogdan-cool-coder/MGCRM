<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4 → 32px · шаг 4px (брендбук §4.1)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--mg-font-sans); background: var(--mg-surface-card); color: var(--mg-text-primary); }
  .row { display: flex; gap: 16px; padding: 20px; align-items: flex-end; }
  .item { text-align: center; }
  .bar { background: var(--mg-primary-400); border-radius: 2px; width: 100%; }
  .box { display: flex; align-items: flex-end; justify-content: center; height: 40px; }
  .lbl { font-size: 11px; font-weight: 600; margin-top: 8px; }
  .px { font-size: 10px; color: var(--mg-text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box"><div class="bar" style="height:4px;width:4px"></div></div><div class="lbl">1</div><div class="px">4</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:8px;width:8px"></div></div><div class="lbl">2</div><div class="px">8</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:12px;width:12px"></div></div><div class="lbl">3</div><div class="px">12</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:16px;width:16px"></div></div><div class="lbl">4</div><div class="px">16</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:20px;width:20px"></div></div><div class="lbl">5</div><div class="px">20</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:24px;width:24px"></div></div><div class="lbl">6</div><div class="px">24</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:28px;width:28px"></div></div><div class="lbl">7</div><div class="px">28</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:32px;width:32px"></div></div><div class="lbl">8</div><div class="px">32</div></div>
  </div>
</body>
</html>
