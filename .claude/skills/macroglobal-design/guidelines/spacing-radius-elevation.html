<!-- @dsCard group="Spacing" viewport="700x150" name="Radius & elevation" subtitle="Скругления 4–12px · тени sm/card/md/lg" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--mg-font-sans); background: var(--mg-surface-card); color: var(--mg-text-primary); }
  .wrap { padding: 18px 20px; display: flex; gap: 28px; }
  .group { display: flex; gap: 14px; }
  .ritem, .sitem { text-align: center; }
  .rbox { width: 48px; height: 48px; background: var(--mg-primary-100); border: 1.5px solid var(--mg-primary-400); }
  .sbox { width: 56px; height: 48px; background: var(--mg-surface-card); border-radius: var(--mg-radius-md); }
  .lbl { font-size: 11px; font-weight: 600; margin-top: 8px; }
  .px { font-size: 10px; color: var(--mg-text-muted); }
  .divider { width: 1px; background: var(--mg-gray-200); }
  .cap { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--mg-text-muted); margin-bottom: 10px; font-weight: 600; }
</style>
</head>
<body>
  <div class="wrap">
    <div>
      <div class="cap">Radius</div>
      <div class="group">
        <div class="ritem"><div class="rbox" style="border-radius:4px"></div><div class="lbl">sm</div><div class="px">4px</div></div>
        <div class="ritem"><div class="rbox" style="border-radius:6px"></div><div class="lbl">md</div><div class="px">6px</div></div>
        <div class="ritem"><div class="rbox" style="border-radius:8px"></div><div class="lbl">lg</div><div class="px">8px</div></div>
        <div class="ritem"><div class="rbox" style="border-radius:12px"></div><div class="lbl">xl</div><div class="px">12px</div></div>
      </div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="cap">Elevation</div>
      <div class="group">
        <div class="sitem"><div class="sbox" style="box-shadow:var(--mg-shadow-sm)"></div><div class="lbl">sm</div></div>
        <div class="sitem"><div class="sbox" style="box-shadow:var(--mg-shadow-card)"></div><div class="lbl">card</div></div>
        <div class="sitem"><div class="sbox" style="box-shadow:var(--mg-shadow-md)"></div><div class="lbl">md</div></div>
        <div class="sitem"><div class="sbox" style="box-shadow:var(--mg-shadow-lg)"></div><div class="lbl">lg</div></div>
      </div>
    </div>
  </div>
</body>
</html>
