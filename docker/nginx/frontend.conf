server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-lived caching for Vite fingerprinted assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SSE streaming endpoints — proxy_buffering must be off.
    # Regex location takes priority over prefix /api block below.
    location ~ ^/api/.*/stream {
        proxy_pass http://nginx:80;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache    off;
        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
    }

    # ---------------------------------------------------------------------------
    # WebSocket proxy — Laravel Reverb (Pusher-compatible protocol).
    #
    # Reverb exposes two path prefixes:
    #   /app/*   — client subscribe (WebSocket upgrade; clients connect here)
    #   /apps/*  — HTTP publish endpoint (app → reverb:8080, internal; listed for
    #              completeness — external requests to /apps are not expected in prod)
    #
    # proxy_http_version 1.1 + Upgrade/Connection headers are REQUIRED for the
    # WebSocket upgrade handshake.  proxy_read_timeout 3600s keeps long-lived
    # idle connections open without nginx closing them prematurely.
    #
    # DOES NOT match /app.js, /app.css, or /api/* — the try_files fallback and
    # the /api prefix block below are unaffected.
    #
    # POST /broadcasting/auth stays on the normal /api upstream (it is a standard
    # Laravel HTTP route handled by php-fpm, not a WebSocket path).
    # ---------------------------------------------------------------------------
    location ~ ^/app(/.*)?$ {
        proxy_pass http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout  60s;
    }

    location ~ ^/apps(/.*)?$ {
        proxy_pass http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout  60s;
    }

    # All /api/* requests → backend nginx (php-fpm proxy)
    location /api {
        proxy_pass http://nginx:80;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
    }

    # SPA history-mode fallback — every unknown path serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
