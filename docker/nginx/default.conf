server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 20M;

    # Upstream proxy timeouts — for any reverse-proxy in front of the container nginx
    # (host nginx, traefik etc). AI tool cascades and document generation can take
    # several minutes on slow runs.
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    # SSE streaming endpoints — must come before the general \.php$ location.
    # fastcgi_buffering off is the critical directive: without it nginx accumulates
    # the entire FastCGI response before forwarding, which breaks SSE. Kept ahead
    # of time for future streaming endpoints (AI cascades, live progress).
    location ~ ^/api/.*/stream {
        fastcgi_pass app:9000;
        fastcgi_buffering off;
        fastcgi_read_timeout 600s;
        fastcgi_send_timeout 600s;
        fastcgi_connect_timeout 60s;
        fastcgi_keep_conn on;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        # 10 minutes — AI tool cascades plus document generation (PHPWord →
        # Gotenberg) can legitimately stretch on slow runs.
        fastcgi_read_timeout 600s;
        fastcgi_send_timeout 600s;
        fastcgi_connect_timeout 60s;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
