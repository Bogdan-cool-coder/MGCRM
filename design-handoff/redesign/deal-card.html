/* generic searchable dropdown (как в задачах) */

function HealthChip({ task }) {
  const overdue = task && task.overdue,none = !task;
  const bg = overdue ? 'rgba(239,68,68,0.15)' : none ? 'rgba(234,179,8,0.12)' : 'rgba(255,255,255,0.1)';
  const col = overdue ? '#ffaba5' : none ? '#ffe08a' : 'rgba(255,255,255,0.8)';

  const label = none ? 'Нет задачи' : overdue ? 'Просрочено: ' + task.kind : task.kind + ' · ' + task.date;
  return <span style={{ display: 'inline-flex', alignItems: 'center', gap: '4px', fontSize: '12px', padding: '2px 8px', borderRadius: 'var(--mg-radius-sm)',

    <i className={'pi ' + icon} style={{ fontSize: '9px' }} />{label}</span>;

function DealHeader({ onMenu, menuRef, onStage }) {
  const stage = STAGES.find((s) => s.id === DEAL.stageId);
  const normal = STAGES.filter((s) => !s.won),won = STAGES.filter((s) => s.won);

      <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>

        <i className="pi pi-exclamation-circle" style={{ fontSize: '12px', color: 'var(--mg-red-700)', marginTop: '1px' }} />
        <span style={{ flex: 1, fontSize: '12px', color: 'var(--c-text2)' }}><strong style={{ color: 'var(--mg-red-700)' }}>Причина отклонения:</strong> {reason}</span></div>}

        <button onClick={() => setStatus('approved')} style={{ display: 'inline-flex', alignItems: 'center', gap: '6px', background: 'var(--mg-green-700)', color: '#fff', border: 'none', borderRadius: 'var(--mg-radius-sm)', padding: '8px 14px', fontFamily: 'var(--mg-font-sans)', fontSize: '13px', fontWeight: 600, cursor: 'pointer' }}><i className="pi pi-check" style={{ fontSize: '12px' }} />Согласовать</button>

      </div>

/* ════════════════════════ right: feed + open tasks + composer ════════════════════════ */
function FeedItem({ it, hlKa }) {
  const hl = it.ka && it.ka === hlKa;
  if (it.system) {
    return <div style={{ display: 'flex', alignItems: 'baseline', gap: '8px', fontSize: '12px', color: 'var(--c-muted)', padding: '5px 0' }}>
      <span style={{ width: 22, height: 22, borderRadius: '50%', flexShrink: 0, alignSelf: 'flex-start', background: 'var(--c-hover)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', zIndex: 1 }}>
        <i className={'pi ' + it.icon} style={{ fontSize: '10px', color: 'var(--c-muted)' }} /></span>
      <span style={{ flex: 1 }}><strong style={{ color: 'var(--c-text2)', fontWeight: 600 }}>{it.who}</strong>{it.dt ? ', ' + it.dt : ''}, {it.time} {it.txt}
        {it.old && <> <span style={{ textDecoration: 'line-through' }}>{it.old}</span> <i className="pi pi-arrow-right" style={{ fontSize: '8px' }} /> <span style={{ color: 'var(--c-text2)', fontWeight: 600 }}>{it.neu}</span></>}</span>

    <span style={{ width: 26, height: 26, borderRadius: '50%', background: isTask ? 'color-mix(in srgb, ' + km[0] + ' 16%, var(--c-card))' : dotBg, color: '#fff', flexShrink: 0, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', zIndex: 1 }}>

    <div style={{ flex: 1, minWidth: 0, background: 'var(--c-card)', border: '1px solid ' + (hl ? 'var(--mg-primary-900)' : 'var(--c-border)'), borderRadius: 'var(--mg-radius-md)', padding: '10px 12px', marginBottom: '4px', opacity: done ? 0.72 : 1, boxShadow: hl ? '0 0 0 3px var(--mg-primary-100)' : 'none', transition: 'box-shadow .2s, border-color .2s' }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', gap: '8px' }}>
        <span style={{ flex: 1, fontSize: '13px', fontWeight: it.kind === 'note' ? 400 : 600, color: 'var(--c-text)', lineHeight: 1.45, textDecoration: done ? 'line-through' : 'none' }}>{it.title}</span>
        {it.kind !== 'note' && <span style={{ fontSize: '10px', fontWeight: 600, padding: '2px 7px', borderRadius: '999px', whiteSpace: 'nowrap', color: done ? 'var(--mg-green-900)' : 'var(--mg-orange-900)', background: done ? 'var(--mg-green-100)' : 'var(--mg-orange-50)' }}>{done ? 'Выполнено' : 'Открыта'}</span>}
        <span style={{ fontSize: '11px', color: 'var(--c-muted)', whiteSpace: 'nowrap' }}>{it.time}</span>
      </div>
      {it.body && <p style={{ fontSize: '12px', color: 'var(--c-text2)', margin: '5px 0 0', lineHeight: 1.45 }}>{it.body}</p>}
      <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginTop: '6px', flexWrap: 'wrap', fontSize: '11px', color: 'var(--c-muted)' }}>

      <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginTop: '8px' }}>

        <input value={cTime} onChange={(e) => setCTime(e.target.value)} style={{ width: 70, height: 30, padding: '0 8px', border: '1px solid var(--c-border2)', borderRadius: 'var(--mg-radius-sm)', background: 'var(--c-card)', fontFamily: 'var(--mg-font-sans)', fontSize: '13px', color: 'var(--c-text)' }} />

/* open task row — expands on click to show result input + Выполнить/Удалить */
function MiniCalendar({ sel, onSel }) {
  const days = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
  const cells = [];for (let i = 0; i < 30; i++) cells.push(i + 1);
  return <div>
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '6px' }}>
      <i className="pi pi-chevron-left" style={{ fontSize: '10px', color: 'var(--c-muted)', cursor: 'pointer' }} />
      <span style={{ fontSize: '12px', fontWeight: 600, color: 'var(--c-text)' }}>Июнь 2026</span>
      <i className="pi pi-chevron-right" style={{ fontSize: '10px', color: 'var(--c-muted)', cursor: 'pointer' }} />
    </div>
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '1px' }}>
      {days.map((d) => <span key={d} style={{ fontSize: '10px', color: 'var(--c-muted)', textAlign: 'center', padding: '2px 0' }}>{d}</span>)}
      {cells.map((n) => <span key={n} onClick={() => onSel && onSel(n)} style={{ fontSize: '12px', textAlign: 'center', padding: '4px 0', borderRadius: 'var(--mg-radius-sm)', cursor: 'pointer',
        background: n === sel ? 'var(--mg-primary-900)' : 'transparent', color: n === sel ? '#fff' : 'var(--c-text)', fontWeight: n === sel ? 600 : 400 }}>{n}</span>)}
    </div>
  </div>;
}
function kindMeta(kind) {
  const m = { call: ['#2A6FDB', 'pi-phone'], proposal: ['#E8A317', 'pi-file-edit'], contract: ['#D14343', 'pi-file'], meeting: ['#1F8A5B', 'pi-calendar'], task: ['var(--mg-primary-900)', 'pi-check-square'] };
  return m[kind] || m.task;
}
function OpenTaskRow({ t }) {
  const [open, setOpen] = useState(false);
  const rootRef = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (rootRef.current && !rootRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [open]);
  const [pick, setPick] = useState(null); // 'date' | 'type' | 'who'
  const [tk, setTk] = useState(t.kind);
  const [reqHL, setReqHL] = useState(false);
  const [result, setResult] = useState('');
  const [title, setTitle] = useState(t.title);
  const [editing, setEditing] = useState(false);
  const [delC, setDelC] = useState(0);
  const onComplete = (e) => { if (e) e.stopPropagation(); if (!open) { setOpen(true); setReqHL(true); return; } if (!result.trim()) { setReqHL(true); return; } setReqHL(false); };
  const [km0, km1] = kindMeta(tk);
  const [who, setWho] = useState(t.who);
  const [q, setQ] = useState('');
  const [due, setDue] = useState(t.due);
  const [oDay, setODay] = useState(24);
  const [oTime, setOTime] = useState('14:00');
  const filtered = RESPONSIBLES.filter((r) => r.n.toLowerCase().includes(q.toLowerCase()));
  return <div ref={rootRef} style={{ border: '1px solid ' + (open ? km0 : 'color-mix(in srgb, ' + km0 + ' 45%, var(--c-border))'), borderRadius: 'var(--mg-radius-md)', background: 'var(--c-sub)', overflow: 'visible', position: 'relative' }}>
    <div onClick={() => setOpen(true)} style={{ display: 'flex', alignItems: 'flex-start', gap: '9px', padding: '8px 10px', cursor: 'pointer' }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <textarea value={title} rows={1} readOnly={!editing} onDoubleClick={(e) => { setEditing(true); e.target.focus(); }} onBlur={() => setEditing(false)} onChange={(e) => setTitle(e.target.value)} onInput={(e) => { e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; }} onClick={(e) => { if (editing) e.stopPropagation(); }} style={{ width: '100%', border: 'none', outline: 'none', resize: 'none', overflow: 'hidden', background: 'transparent', fontFamily: 'var(--mg-font-sans)', fontSize: '13px', color: 'var(--c-text)', lineHeight: 1.4, padding: 0, cursor: editing ? 'text' : 'pointer' }} />
        <div style={{ display: 'flex', gap: '12px', marginTop: '3px' }}>
          <span onClick={(e) => {e.stopPropagation();setPick((p) => p === 'type' ? null : 'type');}} style={{ display: 'inline-flex', alignItems: 'center', gap: '4px', fontSize: '11px', color: pick === 'type' ? 'var(--mg-primary-900)' : km0, cursor: 'pointer' }}><i className={'pi ' + km1} style={{ fontSize: '9px' }} />{({ call: 'Звонок', proposal: 'Предложение', contract: 'Договор', meeting: 'Встреча', task: 'Задача' })[tk] || 'Задача'}</span>
          <span onClick={(e) => {e.stopPropagation();setPick((p) => p === 'date' ? null : 'date');}} style={{ display: 'inline-flex', alignItems: 'center', gap: '4px', fontSize: '11px', color: pick === 'date' ? 'var(--mg-primary-900)' : 'var(--c-muted)', cursor: 'pointer' }}><i className="pi pi-calendar" style={{ fontSize: '9px' }} />{due}</span>
          <span onClick={(e) => {e.stopPropagation();setPick((p) => p === 'who' ? null : 'who');}} style={{ display: 'inline-flex', alignItems: 'center', gap: '4px', fontSize: '11px', color: pick === 'who' ? 'var(--mg-primary-900)' : 'var(--c-muted)', cursor: 'pointer' }}><i className="pi pi-user" style={{ fontSize: '9px' }} />{who}</span>
        </div>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: '6px', flexShrink: 0 }} onClick={(e) => e.stopPropagation()}>
        <button onClick={onComplete} title="Выполнить" style={{ display: 'inline-flex', alignItems: 'center', gap: '6px', background: 'var(--mg-green-700)', color: '#fff', border: 'none', borderRadius: 'var(--mg-radius-sm)', padding: '7px 14px', fontFamily: 'var(--mg-font-sans)', fontSize: '13px', fontWeight: 600, cursor: 'pointer' }}><i className="pi pi-check" style={{ fontSize: '12px' }} />Выполнить</button>
        <i className="pi pi-times" title={delC >= 1 ? 'Ещё ' + (3 - delC) + ' клик(а) для удаления' : 'Удалить (3 клика)'} onClick={() => setDelC((n) => n + 1)} style={{ fontSize: '12px', color: delC >= 1 ? 'var(--mg-red-600)' : 'var(--c-muted)', cursor: 'pointer', padding: '2px', transform: delC >= 1 ? 'scale(' + (1 + delC * 0.12) + ')' : 'none', transition: 'transform .1s' }} />
      </div>
    </div>
    {/* type picker popover */}
    {pick === 'type' && <div onMouseLeave={() => setPick(null)} style={{ position: 'absolute', top: 50, left: 10, zIndex: 25, width: 190, background: 'var(--c-card)', border: '1px solid var(--c-border)', borderRadius: 'var(--mg-radius-md)', boxShadow: 'var(--mg-shadow-lg)', padding: '5px' }}>
      {[['call', 'Звонок'], ['proposal', 'Предложение'], ['contract', 'Договор'], ['meeting', 'Встреча'], ['task', 'Задача']].map(([k, l]) => { const a = k === tk, mm = kindMeta(k);
        return <button key={k} onClick={() => { setTk(k); setPick(null); }} style={{ display: 'flex', alignItems: 'center', gap: '9px', width: '100%', background: a ? 'var(--mg-primary-100)' : 'transparent', border: 'none', cursor: 'pointer', fontFamily: 'var(--mg-font-sans)', fontSize: '13px', padding: '7px 9px', borderRadius: 'var(--mg-radius-sm)', textAlign: 'left', color: 'var(--c-text)' }}
          onMouseEnter={(e) => { if (!a) e.currentTarget.style.background = 'var(--c-hover)'; }} onMouseLeave={(e) => { if (!a) e.currentTarget.style.background = 'transparent'; }}>
          <i className={'pi ' + mm[1]} style={{ fontSize: '12px', color: mm[0] }} /><span style={{ flex: 1 }}>{l}</span>{a && <i className="pi pi-check" style={{ fontSize: '11px' }} />}</button>; })}
    </div>}
    {/* date picker popover */}
    {pick === 'date' && <div onMouseLeave={() => setPick(null)} style={{ position: 'absolute', top: 50, left: 10, zIndex: 25, width: 232, background: 'var(--c-card)', border: '1px solid var(--c-border)', borderRadius: 'var(--mg-radius-md)', boxShadow: 'var(--mg-shadow-lg)', padding: '10px' }}>
      <MiniCalendar sel={oDay} onSel={setODay} />
      <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginTop: '8px' }}>
        <i className="pi pi-clock" style={{ fontSize: '11px', color: 'var(--c-muted)' }} />
        <input value={oTime} onChange={(e) => setOTime(e.target.value)} style={{ width: 70, height: 30, padding: '0 8px', border: '1px solid var(--c-border2)', borderRadius: 'var(--mg-radius-sm)', background: 'var(--c-card)', fontFamily: 'var(--mg-font-sans)', fontSize: '13px', color: 'var(--c-text)' }} />
        <span style={{ flex: 1 }} /><SolidBtn label="ОК" onClick={() => {setDue(String(oDay).padStart(2, '0') + '.06.2026 ' + oTime);setPick(null);}} />
      </div>
    </div>}
    {/* responsible picker popover (с поиском) */}
    {pick === 'who' && <div onMouseLeave={() => setPick(null)} style={{ position: 'absolute', top: 50, left: 10, zIndex: 25, width: 232, background: 'var(--c-card)', border: '1px solid var(--c-border)', borderRadius: 'var(--mg-radius-md)', boxShadow: 'var(--mg-shadow-lg)', padding: '6px' }}>
      <div style={{ position: 'relative', marginBottom: '5px' }}>
        <i className="pi pi-search" style={{ position: 'absolute', left: 9, top: '50%', transform: 'translateY(-50%)', fontSize: '11px', color: 'var(--c-muted)' }} />
        <input autoFocus value={q} onChange={(e) => setQ(e.target.value)} placeholder="Начните вводить имя…" style={{ width: '100%', height: 32, padding: '0 10px 0 28px', border: '1px solid var(--c-border2)', borderRadius: 'var(--mg-radius-sm)', background: 'var(--c-card)', fontFamily: 'var(--mg-font-sans)', fontSize: '13px', color: 'var(--c-text)', boxSizing: 'border-box', outline: 'none' }} />
      </div>
      <div style={{ maxHeight: 168, overflowY: 'auto' }}>
        {filtered.map((r) => {const a = r.n === who;
          return <button key={r.n} onClick={() => {setWho(r.n);setPick(null);setQ('');}} style={{ display: 'flex', alignItems: 'center', gap: '8px', width: '100%', background: a ? 'var(--mg-primary-100)' : 'transparent', border: 'none', cursor: 'pointer', fontFamily: 'var(--mg-font-sans)', fontSize: '13px', padding: '7px 8px', borderRadius: 'var(--mg-radius-sm)', textAlign: 'left', color: a ? 'var(--mg-primary-900)' : 'var(--c-text)' }}
          onMouseEnter={(e) => {if (!a) e.currentTarget.style.background = 'var(--c-hover)';}} onMouseLeave={(e) => {if (!a) e.currentTarget.style.background = 'transparent';}}>
            <span style={{ width: 20, height: 20, borderRadius: '50%', background: 'var(--mg-primary-900)', color: '#fff', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: '8px', fontWeight: 600, flexShrink: 0 }}>{r.i}</span>
            <span style={{ flex: 1 }}>{r.n}</span>{a && <i className="pi pi-check" style={{ fontSize: '11px' }} />}</button>;})}
        {filtered.length === 0 && <div style={{ fontSize: '12px', color: 'var(--c-muted)', padding: '8px' }}>Не найдено</div>}
      </div>
    </div>}
    {open && <div style={{ borderTop: '1px solid var(--c-border)', padding: '10px' }}>
      <textarea value={result} onChange={(e) => { setResult(e.target.value); if (e.target.value.trim()) setReqHL(false); }} placeholder="Опишите результат…" rows={2} style={{ width: '100%', resize: 'none', boxSizing: 'border-box', fontFamily: 'var(--mg-font-sans)', fontSize: '13px', color: 'var(--c-text)', background: 'var(--c-card)', border: '1px solid ' + (reqHL ? 'var(--mg-red-600)' : 'var(--c-border2)'), borderRadius: 'var(--mg-radius-sm)', padding: '8px 10px', outline: 'none', boxShadow: reqHL ? '0 0 0 3px var(--mg-red-50)' : 'none' }} />
    </div>}
  </div>;
}

function RightPanel() {
  const [search, setSearch] = useState(false);
  const [openTasksOpen, setOpenTasksOpen] = useState(true);
  const [feed] = useState(FEED);
  const scrollRef = React.useRef(null);
  const [hlKa, setHlKa] = useState(null);
  const goToKa = (type) => {
    const c = scrollRef.current;if (!c) return;
    const el = c.querySelector('[data-ka="' + type + '"]');
    if (el) {const er = el.getBoundingClientRect(),cr = c.getBoundingClientRect();c.scrollTop += er.top - cr.top - 40;setHlKa(type);setTimeout(() => setHlKa(null), 2000);}
  };
  return <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', background: 'var(--c-feed)', overflow: 'hidden', position: 'relative' }}>
    {/* topbar: key-action widgets (KPI-style pills, reused) + search */}
    <div style={{ display: 'flex', alignItems: 'center', gap: '6px', padding: '8px 14px', borderBottom: '1px solid var(--c-border)', background: 'var(--c-card)', flexShrink: 0, flexWrap: 'wrap' }}>
      {KEY_ACTIONS.map((k) =>
      <span key={k.type} onClick={() => goToKa(k.type)} title={'Найти в ленте: ' + k.label} style={{ display: 'inline-flex', alignItems: 'center', gap: '6px', padding: '5px 11px', borderRadius: '999px',
        background: 'var(--c-hover)', border: '1px solid var(--c-border)', color: 'var(--c-text2)', fontSize: '12px', cursor: 'pointer', whiteSpace: 'nowrap' }}>
          <i className={'pi ' + k.icon} style={{ fontSize: '11px', color: 'var(--c-muted)' }} /><span style={{ opacity: 0.85 }}>{k.label}:</span><strong style={{ fontWeight: 700, color: 'var(--c-text)' }}>{k.value}</strong></span>)}
      <span style={{ flex: 1 }} />
      <i className="pi pi-search" onClick={() => setSearch((s) => !s)} style={{ fontSize: '14px', color: search ? 'var(--mg-primary-900)' : 'var(--c-muted)', cursor: 'pointer', padding: '4px' }} />
    </div>
    {search && <SearchOverlay />}
    {/* feed (bottom-up) */}
    <div ref={scrollRef} style={{ flex: 1, overflowY: 'auto', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '18px 22px', marginTop: 'auto' }}>
        {feed.map((g) =>
        <div key={g.date} style={{ marginBottom: '8px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', padding: '4px 0 12px', cursor: 'pointer' }}>
              <span style={{ flex: 1, height: 1, background: 'var(--c-border)' }} />
              <span style={{ fontSize: '11px', fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--c-muted)' }}>{g.date}</span>
              <span style={{ flex: 1, height: 1, background: 'var(--c-border)' }} />
            </div>
            <div style={{ position: 'relative', paddingLeft: '4px', display: 'flex', flexDirection: 'column', gap: '8px' }}>
              <span style={{ position: 'absolute', left: '13px', top: '8px', bottom: '12px', width: '2px', background: 'var(--c-border)' }} />
              {g.items.map((it) => <FeedItem key={it.id} it={it} hlKa={hlKa} />)}
            </div>
          </div>)}
      </div>
    </div>
    {/* open tasks — list of 2 (collapsible by clicking the strip) */}
    <div style={{ background: 'var(--c-card)', borderTop: '1px solid var(--c-border)', flexShrink: 0 }}>
      <div onClick={() => setOpenTasksOpen((o) => !o)} style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '10px 18px', cursor: 'pointer' }}>
        <i className="pi pi-list-check" style={{ fontSize: '13px', color: 'var(--mg-orange-900)' }} />
        <span style={{ fontSize: '12px', fontWeight: 600, color: 'var(--c-text2)' }}>Открытые задачи: {OPEN_TASKS.length}</span>
      </div>
      {openTasksOpen && <div style={{ padding: '0 18px 10px', display: 'flex', flexDirection: 'column', gap: '6px' }}>
        {OPEN_TASKS.map((t) => <OpenTaskRow key={t.id} t={t} />)}
      </div>}
    </div>
    <Composer />
  </div>;
}

/* ════════════════════════ dialogs ════════════════════════ */
function Modal({ title, onClose, children, footer, width = 460 }) {
  return <div onClick={onClose} style={{ position: 'fixed', inset: 0, zIndex: 50, background: 'rgba(0,0,0,0.4)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '24px' }}>
    <div onClick={(e) => e.stopPropagation()} style={{ width, maxWidth: '100%', background: 'var(--c-card)', borderRadius: 'var(--mg-radius-lg)', boxShadow: 'var(--mg-shadow-lg)', overflow: 'hidden' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 18px', borderBottom: '1px solid var(--c-border)' }}>
        <span style={{ fontSize: '15px', fontWeight: 600, color: 'var(--c-text)' }}>{title}</span>
        <i className="pi pi-times" onClick={onClose} style={{ fontSize: '14px', color: 'var(--c-muted)', cursor: 'pointer', padding: '4px' }} /></div>
      <div style={{ padding: '18px', maxHeight: '70vh', overflowY: 'auto' }}>{children}</div>
      <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '8px', padding: '12px 18px', borderTop: '1px solid var(--c-border)', background: 'var(--c-sub)' }}>{footer}</div>
    </div>
  </div>;
}
function MField({ label, children, req }) {
  return <div style={{ marginBottom: '14px' }}><label style={{ fontSize: '12px', fontWeight: 500, color: 'var(--c-text2)', display: 'block', marginBottom: '5px' }}>{label}{req && <span style={{ color: 'var(--mg-red-600)', marginLeft: '3px' }}>*</span>}</label>{children}</div>;
}
function MInput({ ph }) {

    <MField label="Текущая стадия"><span style={{ display: 'inline-flex', alignItems: 'center', gap: '7px' }}>
      <span style={{ width: 9, height: 9, borderRadius: '50%', background: cur.color }} /><span style={{ fontSize: '13px', fontWeight: 600, color: 'var(--c-text)' }}>{cur.name}</span></span></MField>
    <label style={{ fontSize: '12px', fontWeight: 500, color: 'var(--c-text2)', display: 'block', marginBottom: '7px' }}>Новая стадия</label>
    <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
      {STAGES.map((s) => {const sel = s.id === DEAL.stageId;
        return <div key={s.id} style={{ display: 'flex', alignItems: 'center', gap: '9px', padding: '8px 10px', borderRadius: 'var(--mg-radius-sm)', cursor: 'pointer',
          background: sel ? 'var(--mg-primary-100)' : 'transparent', border: '1px solid ' + (sel ? 'transparent' : 'var(--c-border)') }}>
          <span style={{ width: 9, height: 9, borderRadius: '50%', background: s.color, flexShrink: 0 }} />
          <span style={{ flex: 1, fontSize: '13px', fontWeight: sel ? 600 : 500, color: sel ? 'var(--mg-primary-900)' : 'var(--c-text)' }}>{s.name}</span>
          {sel && <i className="pi pi-check" style={{ fontSize: '12px', color: 'var(--mg-primary-900)' }} />}</div>;})}
    </div>
  </Modal>;
}
function DealMenu({ onClose }) {
  const items = [['pi-link', 'Копировать ссылку'], ['sep'], ['pi-pencil', 'Переименовать'], ['pi-tag', 'Изменить теги'], ['sep'],
  ['pi-arrows-v', 'Свернуть все группы'], ['pi-arrows-v', 'Развернуть все группы'], ['pi-cog', 'Настроить поля'], ['sep'], ['pi-trash', 'Удалить сделку', true]];
  return <div onMouseLeave={onClose} style={{ position: 'absolute', top: 12, left: 392, zIndex: 30, background: 'var(--c-card)', border: '1px solid var(--c-border)', borderRadius: 'var(--mg-radius-md)', boxShadow: 'var(--mg-shadow-lg)', padding: '5px', minWidth: 210 }}>
    {items.map((it, i) => it[0] === 'sep' ? <div key={i} style={{ height: 1, background: 'var(--c-border)', margin: '5px 0' }} /> :
    <button key={i} onClick={onClose} style={{ display: 'flex', alignItems: 'center', gap: '10px', width: '100%', background: 'transparent', border: 'none', cursor: 'pointer', fontFamily: 'var(--mg-font-sans)', fontSize: '13px', fontWeight: 500, padding: '8px 10px', borderRadius: 'var(--mg-radius-sm)', textAlign: 'left', color: it[2] ? 'var(--mg-red-700)' : 'var(--c-text)' }}
    onMouseEnter={(e) => e.currentTarget.style.background = 'var(--c-hover)'} onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
        <i className={'pi ' + it[0]} style={{ fontSize: '14px', color: it[2] ? 'var(--mg-red-700)' : 'var(--c-muted)' }} />{it[1]}</button>)}
  </div>;
}

/* ════════════════════════ app ════════════════════════ */
const TWEAK_DEFAULTS = { accent: '#172747', dark: false };
function App() {
  const [tab, setTab] = useState('main');
  const [menu, setMenu] = useState(false);
  const [dialog, setDialog] = useState(null);
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const accent = t.accent,dark = t.dark;
  const ACC = { '#172747': '#1f2f5a', '#2b2f36': '#3a3f47', '#312e81': '#3f3a9e', '#0f4d3a': '#13654c' };
  const menuRef = React.useRef(null);
  return <div className={'surface' + (dark ? ' dark' : '')} style={{ '--mg-primary-900': accent, '--mg-primary-800': ACC[accent] || '#1f2f5a', height: '100vh', display: 'flex', position: 'relative', background: 'var(--c-page)' }}>
    <LeftPanel tab={tab} setTab={setTab} onMenu={() => setMenu((m) => !m)} menuRef={menuRef} setDialog={setDialog} />
    {menu && <DealMenu onClose={() => setMenu(false)} />}
    <RightPanel />
    {dialog === 'product' && <AddProductDialog onClose={() => setDialog(null)} />}
    {dialog === 'contact' && <AddContactDialog onClose={() => setDialog(null)} />}
    {dialog === 'stage' && <StageDialog onClose={() => setDialog(null)} />}
    <TweaksPanel title="Tweaks">
      <TweakSection label="Бренд" />
      <TweakColor label="Акцент" value={t.accent} options={['#172747', '#2b2f36', '#312e81', '#0f4d3a']} onChange={(v) => setTweak('accent', v)} />
      <TweakSection label="Полотно" />
      <TweakToggle label="Тёмная тема" value={t.dark} onChange={(v) => setTweak('dark', v)} />
    </TweaksPanel>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
