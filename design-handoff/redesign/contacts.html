function Avatar({ name, size = 30, square }) {
  const ini = (name || '').trim().split(/\s+/).slice(0, 2).map((w) => w[0] ? w[0].toUpperCase() : '').join('') || '?';
  return <span style={{ width: size, height: size, borderRadius: square ? 'var(--mg-radius-md)' : '50%', flexShrink: 0, background: 'var(--mg-primary-900)', color: '#fff', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontWeight: 600, fontSize: Math.round(size * 0.38) }}>{ini}</span>;
}
function Tag({ children, sev = 'secondary', size = 'sm' }) {
  const m = { success: ['var(--mg-status-success-bg)', 'var(--mg-status-success-text)'], danger: ['var(--mg-status-danger-bg)', 'var(--mg-status-danger-text)'], warning: ['var(--mg-status-warning-bg)', 'var(--mg-status-warning-text)'], info: ['var(--mg-status-info-bg)', 'var(--mg-status-info-text)'], primary: ['var(--mg-primary-100)', 'var(--mg-primary-900)'], neutral: ['var(--c-hover)', 'var(--c-text2)'] }[sev];
  return <span style={{ display: 'inline-flex', alignItems: 'center', gap: '4px', fontSize: size === 'sm' ? '11px' : '12px', fontWeight: 600, padding: size === 'sm' ? '1px 7px' : '2px 9px', borderRadius: 'var(--mg-radius-sm)', background: m[0], color: m[1], whiteSpace: 'nowrap' }}>{children}</span>;
}
function KpiChip({ icon, value, label, accent }) {
  const m = { info: ['var(--mg-blue-100)', 'var(--mg-blue-700)'], brand: ['var(--mg-primary-100)', 'var(--mg-primary-900)'], success: ['var(--mg-green-100)', 'var(--mg-green-900)'], teal: ['#d4f3e8', '#0A6E4E'], amber: ['var(--mg-orange-100)', 'var(--mg-orange-900)'], danger: ['var(--mg-red-50)', 'var(--mg-red-700)'] }[accent] || ['var(--c-hover)', 'var(--c-text2)'];
  return <span style={{ display: 'inline-flex', alignItems: 'center', gap: '7px', padding: '6px 13px', borderRadius: '999px', background: m[0], color: m[1], fontSize: '13px', whiteSpace: 'nowrap' }}>
    <i className={`pi ${icon}`} style={{ fontSize: '12px' }} /><span style={{ opacity: .8 }}>{label}:</span><strong style={{ fontWeight: 700 }}>{value}</strong></span>;
}
function Btn({ label, icon, primary, outlined, text, onClick, compact }) {
  const [h, setH] = useState(false);
  let bg = primary ? h ? 'var(--mg-primary-800)' : 'var(--mg-primary-900)' : text || outlined ? h ? 'var(--c-hover)' : 'transparent' : h ? 'var(--c-hover)' : 'var(--c-card)';
  let col = primary ? '#fff' : 'var(--c-text2)';
  let bd = primary ? 'transparent' : text ? 'transparent' : 'var(--c-border2)';
  return <button onClick={onClick} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: '7px', fontFamily: 'var(--mg-font-sans)', fontSize: '13px', fontWeight: 600, padding: label ? '0 14px' : '0 10px', borderRadius: 'var(--mg-radius-md)', cursor: 'pointer', color: col, border: '1px solid ' + bd, background: bg, whiteSpace: 'nowrap', transition: 'background .15s', height: compact ? '31px' : '38px', boxSizing: 'border-box' }}>
    {icon && <i className={`pi ${icon}`} style={{ fontSize: '13px' }} />}{label}</button>;
}
function FSelect({ placeholder, value }) {
  return <div style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '8px 11px', border: '1px solid var(--c-border2)', borderRadius: 'var(--mg-radius-md)', fontSize: '13px', color: value ? 'var(--c-text)' : 'var(--c-muted)', cursor: 'pointer', background: 'var(--c-card)' }}>

}
function FField({ label, children }) {

const tagSev = (t) => t === 'Договор' || t === 'Ключевой' ? 'primary' : t === 'Новый' ? 'info' : t === 'Холодный' ? 'neutral' : 'warning';

function Th({ children, right, center }) {return <th style={{ textAlign: center ? 'center' : right ? 'right' : 'left', padding: '10px 14px', fontSize: '11px', fontWeight: 600, color: 'var(--c-muted)', textTransform: 'uppercase', letterSpacing: '.04em', borderBottom: '1px solid var(--c-border)', whiteSpace: 'nowrap' }}>{children}</th>;}
function Cell({ children, right, center, muted }) {return <td style={{ padding: '10px 14px', fontSize: '13px', color: muted ? 'var(--c-muted)' : 'var(--c-text)', borderBottom: '1px solid var(--c-border)', whiteSpace: 'nowrap', textAlign: center ? 'center' : right ? 'right' : 'left' }}>{children}</td>;}
function TouchCell({ touch, tr }) {return <td style={{ padding: '10px 14px', fontSize: '13px', color: TR[tr], fontWeight: tr === 'n' ? 400 : 500, borderBottom: '1px solid var(--c-border)', whiteSpace: 'nowrap' }}>{touch}</td>;}
function PageSize() {
  const [open, setOpen] = useState(false);
  const [val, setVal] = useState(50);
  return <span style={{ display: 'inline-flex', alignItems: 'center', gap: '8px' }}>

      {open && <React.Fragment>
        <div onClick={() => setOpen(false)} style={{ position: 'fixed', inset: 0, zIndex: 40 }} />
        <div style={{ position: 'absolute', bottom: 'calc(100% + 5px)', left: 0, zIndex: 41, minWidth: 92, background: 'var(--c-card)', border: '1px solid var(--c-border)', borderRadius: 'var(--mg-radius-md)', boxShadow: 'var(--mg-shadow-lg)', padding: '5px' }}>

        </div>
      </React.Fragment>}
    </span>

}

function DealsCell({ n }) {return <Cell center>{n > 0 ? <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', minWidth: 22, height: 20, padding: '0 6px', borderRadius: 10, background: 'var(--mg-primary-100)', color: 'var(--mg-primary-900)', fontSize: '12px', fontWeight: 700 }}>{n}</span> : <span style={{ color: 'var(--c-muted)' }}>—</span>}</Cell>;}
function TagsCell({ tags }) {return <Cell><span style={{ display: 'inline-flex', gap: '4px', flexWrap: 'wrap' }}>{tags.length ? tags.map((t, i) => <Tag key={i} sev={tagSev(t)}>{t}</Tag>) : <span style={{ color: 'var(--c-muted)' }}>—</span>}</span></Cell>;}

      <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
        <div style={{ fontSize: '11px', fontWeight: 700, color: 'var(--c-muted)', textTransform: 'uppercase', letterSpacing: '.05em' }}>Когда</div>
        <FField label="Создан"><FSelect placeholder="За всё время" /></FField>
        <FField label="Последняя активность"><FSelect placeholder="За всё время" /></FField>
      </div>
    </div>
    <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '8px', marginTop: '16px' }}>
      <Btn label="Сбросить" text /><Btn label="Применить" icon="pi-check" primary onClick={onClose} />
    </div>
  </div>;
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const dark = t.dark;
  const [entity, setEntity] = useState('company');
  const [filters, setFilters] = useState(false);

  const ACC = { '#172747': { light: '#2B4987', c100: '#e3e8f3', tile: '#e3e8f3' }, '#2b2f36': { light: '#545b66', c100: '#e7e8ea', tile: '#e7e8ea' }, '#312e81': { light: '#4f46e5', c100: '#e7e7fb', tile: '#e7e7fb' }, '#0f4d3a': { light: '#1F8A5B', c100: '#d9f2e6', tile: '#d9f2e6' } };
  const SHP = { 'Острые': ['2px', '3px', '4px', '6px'], 'Скруглённые': ['4px', '6px', '8px', '12px'], 'Мягкие': ['9px', '13px', '18px', '24px'] };
  const a = ACC[t.accent] || ACC['#172747'];const s = SHP[t.shape] || SHP['Скруглённые'];
  const vars = { '--mg-primary-900': t.accent, '--mg-primary-light': a.light, '--mg-primary-100': a.c100, '--c-tile': a.tile, '--mg-radius-sm': s[0], '--mg-radius-md': s[1], '--mg-radius-lg': s[2], '--mg-radius-xl': s[3], minHeight: '100vh', background: 'var(--c-page)' };
  if (!dark && t.mood === 'Тёплый') vars['--c-page'] = '#f4f1ec';
  if (!dark && t.mood === 'Брендовый') vars['--c-page'] = a.tile;

  const isCo = entity === 'company';
  const Seg = ({ v, label }) => {const ac = entity === v;
    return <button onClick={() => setEntity(v)} style={{ fontSize: '13px', fontWeight: 600, padding: '7px 16px', border: 'none', cursor: 'pointer', background: ac ? 'var(--c-card)' : 'transparent', color: ac ? 'var(--mg-primary-900)' : 'var(--c-muted)', borderRadius: '5px', boxShadow: ac ? 'var(--mg-shadow-sm)' : 'none' }}>{label}</button>;
  };

  return <div className={'surface' + (dark ? ' dark' : '')} style={vars}>
    <div style={{ display: 'flex', alignItems: 'center', gap: '14px', padding: '14px 28px', background: 'var(--mg-primary-950)', position: 'sticky', top: 0, zIndex: 5 }}>
      <span style={{ color: '#fff', fontWeight: 700, fontSize: '14px' }}>Редизайн раздела «Контакты»</span>
      <span style={{ flex: 1 }} />
      <button onClick={() => setTweak('dark', !dark)} style={{ display: 'inline-flex', alignItems: 'center', gap: '7px', fontSize: '13px', fontWeight: 600, padding: '7px 14px', borderRadius: '6px', cursor: 'pointer', border: '1px solid rgba(255,255,255,0.22)', background: 'transparent', color: '#fff' }}>
        <i className={`pi ${dark ? 'pi-sun' : 'pi-moon'}`} style={{ fontSize: '14px' }} />{dark ? 'Светлая' : 'Тёмная'}</button>
    </div>

    <div style={{ padding: '24px 28px', maxWidth: '1340px', margin: '0 auto' }}>
      <div style={{ background: 'var(--c-card)', border: '1px solid var(--c-border)', borderRadius: 'var(--mg-radius-lg)', boxShadow: 'var(--mg-shadow-md)', overflow: 'hidden' }}>
        {/* PAGE HEADER — title + type switch right of it */}
        <div style={{ display: 'flex', alignItems: 'center', gap: '12px', padding: '16px 20px', borderBottom: '1px solid var(--c-border)', flexWrap: 'wrap' }}>
          <i className={`pi ${isCo ? 'pi-building' : 'pi-users'}`} style={{ fontSize: '20px', color: 'var(--mg-primary-900)' }} />
          <h1 style={{ margin: 0, fontSize: '20px', fontWeight: 600, color: 'var(--c-text)' }}>Контакты</h1>
          <div style={{ display: 'inline-flex', gap: '2px', background: 'var(--mg-gray-100)', borderRadius: '7px', padding: '3px', height: '38px' }}>
            <Seg v="company" label="Компания" /><Seg v="contact" label="Физлицо" /></div>
          <div style={{ position: 'relative' }}>
            <i className="pi pi-search" style={{ position: 'absolute', left: '11px', top: '50%', transform: 'translateY(-50%)', fontSize: '13px', color: 'var(--c-muted)' }} />
            <input placeholder={isCo ? 'Поиск по названию, БИН…' : 'Поиск по имени, телефону, email…'} style={{ width: '240px', boxSizing: 'border-box', fontFamily: 'var(--mg-font-sans)', fontSize: '14px', padding: '8px 12px 8px 32px', border: '1px solid var(--c-border2)', borderRadius: 'var(--mg-radius-md)', background: 'var(--c-card)', color: 'var(--c-text)', outline: 'none', height: "38px" }} /></div>
          <div style={{ position: 'relative' }}>
            <Btn label="Фильтры" icon="pi-filter" outlined onClick={() => setFilters((f) => !f)} />
            <span style={{ position: 'absolute', top: -7, right: -7, minWidth: 18, height: 18, padding: '0 5px', borderRadius: 9, background: '#E8821E', color: '#fff', fontSize: '10px', fontWeight: 700, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>1</span></div>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: '8px', marginLeft: 'auto' }}>
          <MenuButton icon="pi-ellipsis-v" outlined compact items={HDR_ITEMS} align="right" />
          <Btn label={isCo ? 'Создать компанию' : 'Создать контакт'} icon="pi-plus" primary />
          </span>
        </div>

        {/* KPI SUMMARY — per entity */}
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px', padding: '13px 20px', borderBottom: '1px solid var(--c-border)' }}>
          {isCo ? <React.Fragment>
            <KpiChip icon="pi-building" value="96" label="Всего" accent="brand" />
            <KpiChip icon="pi-verified" value="58" label="Клиенты" accent="success" />
            <KpiChip icon="pi-flag-fill" value="8" label="Категория L" accent="danger" />
            <KpiChip icon="pi-flag-fill" value="21" label="Категория M" accent="amber" />
            <KpiChip icon="pi-flag-fill" value="67" label="Категория S" accent="success" />
            <KpiChip icon="pi-plus-circle" value="5" label="Новые за неделю" accent="teal" />
          </React.Fragment> : <React.Fragment>
            <KpiChip icon="pi-users" value="248" label="Всего" accent="brand" />
            <KpiChip icon="pi-verified" value="180" label="Активные" accent="success" />
            <KpiChip icon="pi-clock" value="23" label="Без касаний 30+ дн" accent="info" />
            <KpiChip icon="pi-plus-circle" value="12" label="Новые за неделю" accent="teal" />
          </React.Fragment>}
        </div>

        {/* TOOLBAR moved into header */}

        {filters && <FilterOverlay entity={entity} onClose={() => setFilters(false)} />}

        {/* TABLE */}
        <div style={{ overflowX: 'visible' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontFamily: 'var(--mg-font-sans)' }}>
            {isCo ?
            <thead><tr><Th>Название</Th><Th center>Категория</Th><Th>Страна</Th><Th center>Сделки</Th><Th>Посл. контакт</Th><Th>Вовлечённость</Th><Th>Ответственный</Th><Th>Теги</Th></tr></thead> :
            <thead><tr><Th>ФИО</Th><Th>Компания</Th><Th>Телефон</Th><Th>Посл. контакт</Th><Th>Теги</Th><Th>Автор</Th></tr></thead>}
            <tbody>{isCo ? COMPANIES.map((c) => <CompanyRow key={c.id} c={c} />) : CONTACTS.map((c) => <ContactRow key={c.id} c={c} />)}</tbody>
          </table>
        </div>

        {/* FOOTER */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 20px', borderTop: '1px solid var(--c-border)' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}><PageSize /><span style={{ fontSize: '13px', color: 'var(--c-muted)' }}>{isCo ? 'Показано 1–7 из 96' : 'Показано 1–8 из 248'}</span></div>
          <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
            {['pi-angle-double-left', 'pi-angle-left'].map((p) => <i key={p} className={`pi ${p}`} style={{ fontSize: '13px', color: 'var(--c-muted)', cursor: 'pointer', padding: '4px' }} />)}
            <span style={{ minWidth: 28, height: 28, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', borderRadius: '5px', background: 'var(--mg-primary-900)', color: '#fff', fontSize: '13px', fontWeight: 600 }}>1</span>
            {['2', '3'].map((n) => <span key={n} style={{ minWidth: 28, height: 28, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', borderRadius: '5px', color: 'var(--c-text2)', fontSize: '13px', cursor: 'pointer' }}>{n}</span>)}
            {['pi-angle-right', 'pi-angle-double-right'].map((p) => <i key={p} className={`pi ${p}`} style={{ fontSize: '13px', color: 'var(--c-muted)', cursor: 'pointer', padding: '4px' }} />)}
          </div>
        </div>
      </div>
    </div>

    <TweaksPanel title="Tweaks">
      <TweakSection label="Бренд" />
      <TweakColor label="Акцент" value={t.accent} options={['#172747', '#2b2f36', '#312e81', '#0f4d3a']} onChange={(v) => setTweak('accent', v)} />
      <TweakSection label="Форма" />
      <TweakRadio label="Скругление" value={t.shape} options={['Острые', 'Скруглённые', 'Мягкие']} onChange={(v) => setTweak('shape', v)} />
      <TweakSection label="Полотно" />
      <TweakRadio label="Фон" value={t.mood} options={['Прохладный', 'Тёплый', 'Брендовый']} onChange={(v) => setTweak('mood', v)} />
      <TweakToggle label="Тёмная тема" value={t.dark} onChange={(v) => setTweak('dark', v)} />
    </TweaksPanel>
  </div>;
}
const TWEAK_DEFAULTS = { accent: '#172747', shape: 'Скруглённые', mood: 'Прохладный', dark: false };
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
