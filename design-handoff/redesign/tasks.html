<!-- @dsCard group="CRM UI Kit" viewport="1280x860" name="Redesign — Задачи (kanban)" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MACRO CRM — Мои задачи</title>
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://unpkg.com/primeicons@7.0.0/primeicons.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--mg-font-sans); background: #6b7280; -webkit-font-smoothing: antialiased; }
  .surface { --c-page:#F1F2F3; --c-card:#FFFFFF; --c-border:#E3E4E6; --c-border2:#D5D6D8;
    --c-text:#272829; --c-text2:#616263; --c-muted:#7E7F82; --c-hover:#F9FAFB; --c-board:#ECEDEF; }
  .surface.dark { --c-page:#272829; --c-card:#3a3b3d; --c-border:#54595E; --c-border2:#54595E;
    --c-text:#F9FAFB; --c-text2:#E3E4E6; --c-muted:#9B9C9F; --c-hover:#444547; --c-board:#1f2021; }
  * { scrollbar-width: none; -ms-overflow-style: none; }
  ::-webkit-scrollbar { width: 0; height: 0; display: none; }
  @keyframes qf-slide { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="./tweaks-panel.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

const { useState } = React;

/* ════════════════════════ data (доска задач, по MyBoardActivityDto / useTaskBoard) ════════════════════════
   buckets: overdue · today · tomorrow · this_week · next_week
   kind: call · meeting · task · note · follow_up   |   priority: low · normal · high · critical
   health: overdue · today · soon · normal · done                                                       */
const BUCKETS = [
  { key: 'overdue',   name: 'Просрочено',          color: '#FF5A44', meta: 'требуют внимания' },
  { key: 'today',     name: 'Сегодня',             color: '#EF9F27', meta: '24 июня, вт' },
  { key: 'tomorrow',  name: 'Завтра',              color: '#378ADD', meta: '25 июня, ср' },
  { key: 'this_week', name: 'На этой неделе',      color: '#7F77DD', meta: 'до 29 июня' },
  { key: 'next_week', name: 'Следующая неделя',    color: '#1D9E75', meta: '30 июня – 6 июля' },
];

const TASKS = [
  // overdue
  { id: 1, bucket: 'overdue', kind: 'call',      title: 'Перезвонить по КП — уточнить сроки', deal: 'Глобус Логистик', oi: 'И', owner: 'Игорь Волков',   due: 'вчера 16:00', priority: 'high',     status: 'in_progress', overdue: '1 день' },
  { id: 2, bucket: 'overdue', kind: 'meeting',   title: 'Согласовать ТЗ с техдиром',          deal: 'СтройМаш',       oi: 'А', owner: 'Алина Сергеева',  due: '21.06 11:00', priority: 'critical', status: 'new',         overdue: '3 дня' },
  // today
  { id: 3, bucket: 'today', kind: 'meeting',     title: 'Демо MACRO ERP',                     deal: 'Қазмұнай Логистик', oi: 'Б', owner: 'Богдан Меркулов', due: 'сегодня 14:00', priority: 'high',   status: 'in_progress' },
  { id: 4, bucket: 'today', kind: 'call',        title: 'Уточнить бюджет на квартал',         deal: 'Альфа Ритейл',   oi: 'А', owner: 'Алина Сергеева',  due: 'сегодня 17:30', priority: 'normal', status: 'new' },
  { id: 5, bucket: 'today', kind: 'task',        title: 'Подготовить коммерческое предложение', deal: 'ТехноСервис',  oi: 'Б', owner: 'Богдан Меркулов', due: 'сегодня 18:00', priority: 'normal', status: 'in_progress' },
  // tomorrow
  { id: 6, bucket: 'tomorrow', kind: 'follow_up', title: 'Отправить договор на подпись',       deal: 'СтройИнвест Групп', oi: 'Б', owner: 'Богдан Меркулов', due: 'завтра 11:00', priority: 'high', status: 'new' },
  { id: 7, bucket: 'tomorrow', kind: 'note',     title: 'Записать итоги встречи с клиентом',   deal: 'Финрезерв Банк', oi: 'И', owner: 'Игорь Волков',   due: 'завтра 09:30', priority: 'low',    status: 'new' },
  // this_week
  { id: 8, bucket: 'this_week', kind: 'call',     title: 'Контрольный звонок после демо',      deal: 'Каспий Девелопмент', oi: 'Б', owner: 'Богдан Меркулов', due: '27.06 15:00', priority: 'normal', status: 'new' },
  { id: 9, bucket: 'this_week', kind: 'task',     title: 'Собрать референсы по отрасли',       deal: null,             oi: 'А', owner: 'Алина Сергеева',  due: '28.06 12:00', priority: 'low',    status: 'new' },
  // next_week
  { id: 10, bucket: 'next_week', kind: 'meeting', title: 'Встреча по интеграции с 1С',         deal: 'ЭнергоПром',     oi: 'И', owner: 'Игорь Волков',   due: '02.07 10:00', priority: 'normal', status: 'new' },
  { id: 11, bucket: 'next_week', kind: 'task',    title: 'Финализировать смету',               deal: 'АгроТрейд',      oi: 'А', owner: 'Алина Сергеева',  due: '03.07 16:00', priority: 'normal', status: 'done' },
];

const KIND = {
  call:      { label: 'Звонок',    icon: 'pi-phone',                    bg: 'var(--mg-orange-50)',  fg: 'var(--mg-orange-900)' },
  meeting:   { label: 'Встреча',   icon: 'pi-calendar',                 bg: 'var(--mg-blue-100)',   fg: 'var(--mg-blue-700)' },
  task:      { label: 'Задача',    icon: 'pi-check-square',             bg: 'var(--mg-gray-100)',   fg: 'var(--mg-gray-700)' },
  note:      { label: 'Заметка',   icon: 'pi-file-edit',                bg: 'color-mix(in srgb, #7F77DD 14%, var(--c-card))', fg: '#4b45a0' },
  follow_up: { label: 'Follow-up', icon: 'pi-arrow-right-arrow-left',   bg: 'color-mix(in srgb, #1D9E75 14%, var(--c-card))', fg: '#15795a' },
};
const PRIORITY = {
  high:     { label: 'Высокий',  color: 'var(--mg-orange-700)' },
  critical: { label: 'Срочный',  color: 'var(--mg-red-600)' },
};
const STATUS = {
  new:         { label: 'Новая',     bg: 'var(--mg-blue-100)',    fg: 'var(--mg-blue-700)' },
  in_progress: { label: 'В работе',  bg: 'var(--mg-orange-50)',   fg: 'var(--mg-orange-900)' },
  done:        { label: 'Выполнена', bg: 'var(--mg-green-100)',   fg: 'var(--mg-green-900)' },
  rejected:    { label: 'Отклонена', bg: 'var(--c-hover)',        fg: 'var(--c-muted)' },
};

function shortName(name) { const p = name.trim().split(' '); return p.length === 1 ? p[0] : p[0] + ' ' + p[1].charAt(0).toUpperCase() + '.'; }

/* ════════════════════════ task card (по TaskCard.vue, в стиле DealsKanbanCard) ════════════════════════ */
function TaskCard({ t, onComplete, selectMode, selectedOn, onToggleSelect }) {
  const [hover, setHover] = useState(false);
  const k = KIND[t.kind];
  const done = t.status === 'done';
  const isOverdue = t.bucket === 'overdue';
  const inset = isOverdue ? '4px 0 0 var(--mg-danger)' : t.priority === 'critical' ? '4px 0 0 var(--mg-orange-700)' : 'none';
  const strip = done ? { bg: 'var(--c-hover)', col: 'var(--mg-green-700)', icon: 'pi-check-circle', text: 'Выполнено' }
    : isOverdue ? { bg: 'var(--mg-red-50)', col: 'var(--mg-red-700)', icon: 'pi-clock', text: 'Просрочено: ' + t.overdue }
    : { bg: 'var(--c-hover)', col: 'var(--c-text2)', icon: 'pi-clock', text: t.due };
  const prio = PRIORITY[t.priority];
  return <div onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
    onClick={() => selectMode && onToggleSelect(t.id)}
    style={{ position: 'relative', background: 'var(--c-card)', border: '1px solid ' + (selectedOn ? 'var(--mg-primary-900)' : isOverdue ? 'var(--mg-danger)' : 'var(--c-border)'),
      borderRadius: 'var(--mg-radius-md)', overflow: 'hidden', cursor: 'pointer', opacity: done ? 0.7 : 1,
      boxShadow: (selectedOn ? '0 0 0 1px var(--mg-primary-900)' : hover ? 'var(--mg-shadow-card)' : 'var(--mg-shadow-sm)') + (inset === 'none' ? '' : ', inset ' + inset),
      transition: 'box-shadow .15s' }}>
    {selectMode && <span style={{ position: 'absolute', top: 8, right: 8, zIndex: 2, display: 'inline-flex', width: 18, height: 18, borderRadius: 4,
      border: '1.5px solid ' + (selectedOn ? 'var(--mg-primary-900)' : 'var(--c-border2)'), background: selectedOn ? 'var(--mg-primary-900)' : 'var(--c-card)',
      alignItems: 'center', justifyContent: 'center' }}>{selectedOn && <i className="pi pi-check" style={{ fontSize: '10px', color: '#fff' }} />}</span>}
    <div style={{ padding: '11px 12px' }}>
      {/* deal link */}
      {t.deal && <div style={{ display: 'flex', alignItems: 'center', gap: '5px', marginBottom: '6px', minWidth: 0 }}>
        <i className="pi pi-briefcase" style={{ fontSize: '10px', color: 'var(--c-muted)', flexShrink: 0 }} />
        <span style={{ fontSize: '12px', color: 'var(--c-muted)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{t.deal}</span>
      </div>}
      {/* title */}
      <div style={{ fontSize: '13px', fontWeight: 600, color: 'var(--c-text)', marginBottom: '8px', lineHeight: 1.3,
        textDecoration: done ? 'line-through' : 'none', display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }} title={t.title}>{t.title}</div>
      {/* kind tag + priority */}
      <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '9px', flexWrap: 'wrap' }}>
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: '4px', background: k.bg, color: k.fg,
          borderRadius: 'var(--mg-radius-sm)', padding: '2px 8px', fontSize: '11px', fontWeight: 500 }}>
          <i className={'pi ' + k.icon} style={{ fontSize: '10px' }} />{k.label}</span>
        {prio && <span style={{ display: 'inline-flex', alignItems: 'center', gap: '3px', fontSize: '11px', fontWeight: 600, color: prio.color }}>
          <i className="pi pi-flag-fill" style={{ fontSize: '9px' }} />{prio.label}</span>}
      </div>
      {/* owner */}
      <div style={{ display: 'flex', alignItems: 'center', gap: '6px', minWidth: 0 }}>
        <span style={{ width: 20, height: 20, borderRadius: '50%', background: 'var(--mg-primary-900)', color: '#fff',
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: '10px', fontWeight: 600, flexShrink: 0 }}>{t.oi}</span>
        <span style={{ fontSize: '12px', color: 'var(--c-muted)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{shortName(t.owner)}</span>
      </div>
    </div>
    {/* status / action strip */}
    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '7px 12px', borderTop: '1px solid var(--c-border)',
      background: strip.bg, fontSize: '11px', minHeight: 30 }}>
      <i className={'pi ' + strip.icon} style={{ fontSize: '11px', color: strip.col, flexShrink: 0 }} />
      <span style={{ color: strip.col, fontWeight: isOverdue ? 500 : 400, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1 }}>{strip.text}</span>
      {!done && <button onClick={(e) => { e.stopPropagation(); onComplete(t.id); }}
        style={{ display: 'inline-flex', alignItems: 'center', gap: '4px', border: 'none', background: 'transparent', color: 'var(--mg-green-700)',
          cursor: 'pointer', fontFamily: 'var(--mg-font-sans)', fontSize: '11px', fontWeight: 600, padding: 0, whiteSpace: 'nowrap', flexShrink: 0 }}>
        <i className="pi pi-check" style={{ fontSize: '10px' }} />Выполнить</button>}
    </div>
  </div>;
}

/* ════════════════════════ column (bucket) ════════════════════════ */
function Column({ col, tasks, onComplete, selectMode, selected, onToggleSelect }) {
  const tint = 'color-mix(in srgb, ' + col.color + ' 13%, var(--c-card))';
  return <div style={{ width: 284, flexShrink: 0, display: 'flex', flexDirection: 'column', alignSelf: 'flex-start', maxHeight: '100%',
    background: 'var(--c-card)', border: '1px solid var(--c-border)', borderRadius: 'var(--mg-radius-lg)',
    boxShadow: 'var(--mg-shadow-sm)', overflow: 'hidden' }}>
    <div style={{ background: tint, borderBottom: '1px solid var(--c-border)', padding: '11px 13px 9px', flexShrink: 0,
      borderTop: '3px solid ' + col.color }}>
      <div style={{ display: 'grid', gridTemplateColumns: '34px 1fr 34px', alignItems: 'center' }}>
        <span style={{ fontSize: '12px', fontWeight: 700, color: 'var(--c-text2)', background: 'var(--c-card)',
          border: '1px solid var(--c-border)', borderRadius: '999px', padding: '1px 0', minWidth: 26, textAlign: 'center', justifySelf: 'start' }}>{tasks.length}</span>
        <span style={{ textAlign: 'center', fontSize: '14px', fontWeight: 700, letterSpacing: '0.04em', textTransform: 'uppercase',
          color: 'var(--c-text)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{col.name}</span>
        <span />
      </div>
      <div style={{ fontSize: '12px', color: 'var(--c-muted)', marginTop: '6px', textAlign: 'center' }}>{col.meta}</div>
    </div>
    <div style={{ overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: '8px', padding: '10px', background: 'var(--c-card)' }}>
      {tasks.length === 0
        ? <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: 60, fontSize: '12px', color: 'var(--c-muted)' }}>Нет задач</div>
        : tasks.map((t) => <TaskCard key={t.id} t={t} onComplete={onComplete} selectMode={selectMode} selectedOn={selected && selected.includes(t.id)} onToggleSelect={onToggleSelect} />)}
    </div>
  </div>;
}

/* ════════════════════════ toolbar button ════════════════════════ */
function ToolBtn({ icon, label, outlined, primary, active, onClick, ref_, compact }) {
  const [h, setH] = useState(false);
  const base = { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: '7px', height: compact ? 31 : 38,
    padding: label ? '0 14px' : compact ? '0 8px' : '0 10px', borderRadius: 'var(--mg-radius-md)', fontFamily: 'var(--mg-font-sans)',
    fontSize: '13px', fontWeight: 600, cursor: 'pointer', whiteSpace: 'nowrap', boxSizing: 'border-box' };
  let st;
  if (primary) st = { ...base, background: h ? 'var(--mg-primary-800)' : 'var(--mg-primary-900)', color: '#fff', border: 'none' };
  else if (outlined) st = { ...base, background: h ? 'var(--c-hover)' : 'transparent', color: 'var(--c-text2)', border: '1px solid var(--c-border2)' };
  else st = { ...base, background: active ? 'var(--mg-primary-100)' : h ? 'var(--c-hover)' : 'transparent',
    color: active ? 'var(--mg-primary-900)' : 'var(--c-muted)', border: 'none' };
  return <button ref={ref_} onClick={onClick} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)} style={st}>
    <i className={'pi ' + icon} style={{ fontSize: '14px' }} />{label}</button>;
}

/* ════════════════════════ top bar (шапка + тулбар в одной строке) ════════════════════════ */
function TopBar({ view, setView, scope, setScope, onMore, moreRef, onFilter, filterOn, fcount, onCreate, counts }) {
  const SCOPES = [['day', 'День'], ['week', 'Неделя'], ['month', 'Месяц']];
  return <div style={{ display: 'flex', alignItems: 'center', gap: '12px', padding: '14px 20px',
    borderBottom: '1px solid var(--c-border)', background: 'var(--c-card)', flexShrink: 0, flexWrap: 'wrap' }}>
    {/* section title */}
    <span style={{ width: 38, height: 38, borderRadius: 'var(--mg-radius-md)', background: 'var(--mg-primary-100)',
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
      <i className="pi pi-check-square" style={{ fontSize: '17px', color: 'var(--mg-primary-900)' }} /></span>
    <div>
      <h1 style={{ fontSize: '19px', fontWeight: 600, color: 'var(--c-text)', margin: 0, lineHeight: 1.1 }}>Мои задачи</h1>
      <div style={{ fontSize: '12px', color: 'var(--c-muted)', marginTop: '2px' }}>MACRO Global · {counts.total} задач · <span style={{ color: 'var(--mg-red-700)' }}>{counts.overdue} просрочено</span></div>
    </div>
    <span style={{ flex: 1, minWidth: 12 }} />
    {/* search + filter */}
    <span style={{ position: 'relative', display: 'inline-flex' }}>
      <button onClick={onFilter} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: '7px', height: 38,
        padding: '0 14px', borderRadius: 'var(--mg-radius-md)', fontFamily: 'var(--mg-font-sans)', fontSize: '13px', fontWeight: 600, cursor: 'pointer',
        whiteSpace: 'nowrap', boxSizing: 'border-box', background: filterOn ? 'var(--mg-primary-100)' : 'transparent',
        color: filterOn ? 'var(--mg-primary-900)' : 'var(--c-text2)', border: '1px solid ' + (filterOn ? 'var(--mg-primary-900)' : 'var(--c-border2)') }}>
        <i className="pi pi-search" style={{ fontSize: '14px' }} />Поиск и фильтр</button>
      {fcount > 0 && <span style={{ position: 'absolute', top: -7, right: -7, minWidth: 18, height: 18, borderRadius: 9,
        background: 'var(--mg-orange-700)', color: '#fff', fontSize: '10px', fontWeight: 700, display: 'inline-flex',
        alignItems: 'center', justifyContent: 'center', padding: '0 4px' }}>{fcount}</span>}
    </span>
    {/* scope segmented (день / неделя / месяц) — только в канбане */}
    {view === 'kanban' && <span style={{ display: 'inline-flex', gap: '2px', background: 'var(--mg-gray-100)', borderRadius: '7px', padding: '3px', alignItems: 'center' }}>
      {SCOPES.map(([v, l]) => {
        const on = scope === v;
        return <button key={v} onClick={() => setScope(v)} style={{ height: 25, padding: '0 11px', border: 'none', borderRadius: '5px', cursor: 'pointer',
          fontFamily: 'var(--mg-font-sans)', fontSize: '12px', fontWeight: 600, background: on ? 'var(--c-card)' : 'transparent',
          color: on ? 'var(--mg-primary-900)' : 'var(--c-muted)', boxShadow: on ? 'var(--mg-shadow-sm)' : 'none' }}>{l}</button>;
      })}
    </span>}
    {/* view switch */}
    <span style={{ display: 'inline-flex', gap: '2px', background: 'var(--mg-gray-100)', borderRadius: '7px', padding: '3px', alignItems: 'center' }}>
      <ToolBtn icon="pi-th-large" compact active={view === 'kanban'} onClick={() => setView('kanban')} />
      <ToolBtn icon="pi-list" compact active={view === 'list'} onClick={() => setView('list')} />
    </span>
    <ToolBtn icon="pi-ellipsis-v" compact outlined onClick={onMore} ref_={moreRef} />
    <ToolBtn icon="pi-plus" label="Создать задачу" primary onClick={onCreate} />
  </div>;
}

function MoreMenu({ onClose, onSelect }) {
  const items = [['pi-check-square', 'Выбрать', 'select'], ['sep'],
    ['pi-calendar', 'Синхронизация с календарём'], ['pi-upload', 'Экспорт в CSV']];
  return <div onMouseLeave={onClose} style={{ position: 'absolute', top: 56, right: 150, zIndex: 30, background: 'var(--c-card)',
    border: '1px solid var(--c-border)', borderRadius: 'var(--mg-radius-md)', boxShadow: 'var(--mg-shadow-lg)', padding: '5px', minWidth: 250 }}>
    {items.map((it, i) => it[0] === 'sep' ? <div key={i} style={{ height: 1, background: 'var(--c-border)', margin: '5px 0' }} /> :
      <button key={i} onClick={() => it[2] === 'select' ? onSelect() : onClose()} style={{ display: 'flex', alignItems: 'center', gap: '10px', width: '100%', background: 'transparent',
        border: 'none', cursor: 'pointer', fontFamily: 'var(--mg-font-sans)', fontSize: '13px', fontWeight: 500, padding: '8px 10px',
        borderRadius: 'var(--mg-radius-sm)', textAlign: 'left', color: 'var(--c-text)' }}
      onMouseEnter={(e) => e.currentTarget.style.background = 'var(--c-hover)'}
      onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
        <i className={'pi ' + it[0]} style={{ fontSize: '14px', color: 'var(--c-muted)' }} />{it[1]}</button>)}
  </div>;
}

/* ════════ bulk toolbar (по DealsBulkToolbar.vue) ════════ */
function BulkBar({ tasks, selected, setSelected, onCancel, onEdit, onPin, onReopen, onDelete }) {
  const all = tasks.length > 0 && selected.length === tasks.length;
  const some = selected.length > 0 && !all;
  const n = selected.length;
  const BBtn = ({ icon, label, danger, onClick }) => {
    const [h, setH] = useState(false);
    const dis = n === 0;
    return <button disabled={dis} onClick={onClick} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{ display: 'inline-flex', alignItems: 'center', gap: '6px', height: 31, padding: '0 12px', borderRadius: 'var(--mg-radius-md)',
        fontFamily: 'var(--mg-font-sans)', fontSize: '13px', fontWeight: 600, cursor: dis ? 'default' : 'pointer', boxSizing: 'border-box', opacity: dis ? 0.45 : 1,
        background: dis ? 'transparent' : h ? 'var(--c-hover)' : 'var(--c-card)',
        color: danger ? 'var(--mg-red-700)' : 'var(--c-text2)', border: '1px solid ' + (danger ? 'var(--mg-red-200)' : 'var(--c-border2)') }}>
      <i className={'pi ' + icon} style={{ fontSize: '13px' }} />{label}</button>;
  };

  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const accent = t.accent, dark = t.dark;
  const ACC = { '#172747': '#1f2f5a', '#2b2f36': '#3a3f47', '#312e81': '#3f3a9e', '#0f4d3a': '#13654c' };
  const moreRef = React.useRef(null);
  const onComplete = (id) => setDone((d) => d.includes(id) ? d.filter((x) => x !== id) : [...d, id]);
  const onPin = (id) => setPinned((p) => p.includes(id) ? p.filter((x) => x !== id) : [...p, id]);
  const onDelete = (ids) => { setRemoved((r) => [...new Set([...r, ...ids])]); setSelected((s) => s.filter((x) => !ids.includes(x))); };
  const enterSelect = () => { setSelectMode(true); setMore(false); };
  const onToggle = (id) => setSelected((s) => s.includes(id) ? s.filter((x) => x !== id) : [...s, id]);
  const cancelSelect = () => { setSelectMode(false); setSelected([]); };
  const tasks = TASKS.filter((tk) => !removed.includes(tk.id)).map((tk) => done.includes(tk.id) ? { ...tk, status: 'done' } : tk);
  const counts = { total: tasks.length, overdue: tasks.filter((x) => x.bucket === 'overdue' && x.status !== 'done').length };
  const visible = SCOPE_BUCKETS[scope];
  const hasOverdue = tasks.some((x) => x.bucket === 'overdue' && x.status !== 'done');
  const shownBuckets = BUCKETS.filter((b) => visible.includes(b.key) && (b.key !== 'overdue' || hasOverdue));
  const boardTasks = tasks.filter((x) => shownBuckets.some((b) => b.key === x.bucket));
  return <div className={'surface' + (dark ? ' dark' : '')} style={{ '--mg-primary-900': accent, '--mg-primary-800': ACC[accent] || '#1f2f5a',
    height: '100vh', display: 'flex', flexDirection: 'column', position: 'relative', background: 'var(--c-board)' }}>
    <TopBar view={view} setView={setView} scope={scope} setScope={setScope} onMore={() => setMore((m) => !m)} moreRef={moreRef}
      onFilter={() => setFilter((f) => !f)} filterOn={filter} fcount={1} onCreate={() => setQuick((q) => !q)} counts={counts} />
    {quick && <QuickCreate onClose={() => setQuick(false)} />}
    {filter && <FilterPanel onClose={() => setFilter(false)} />}
    {more && <MoreMenu onClose={() => setMore(false)} onSelect={enterSelect} />}
    {selectMode && <BulkBar tasks={view === 'kanban' ? boardTasks : tasks} selected={selected} setSelected={setSelected} onCancel={cancelSelect}
      onEdit={() => {}} onPin={() => setPinned((p) => [...new Set([...p, ...selected])])}
      onReopen={() => setDone((d) => d.filter((x) => !selected.includes(x)))} onDelete={() => onDelete(selected)} />}
    {view === 'kanban'
      ? <div style={{ flex: 1, overflowX: 'auto', overflowY: 'auto', display: 'flex', alignItems: 'flex-start', gap: '12px', padding: '16px 20px', minHeight: 0 }}>
          {shownBuckets.map((b) => <Column key={b.key} col={b} tasks={tasks.filter((x) => x.bucket === b.key)} onComplete={onComplete} selectMode={selectMode} selected={selected} onToggleSelect={onToggle} />)}
        </div>
      : <ListView tasks={tasks} onComplete={onComplete} selectMode={selectMode} selected={selected} setSelected={setSelected} pinned={pinned} onPin={onPin} onDelete={onDelete} />}
    <TweaksPanel title="Tweaks">
      <TweakSection label="Бренд" />
      <TweakColor label="Акцент" value={t.accent} options={['#172747', '#2b2f36', '#312e81', '#0f4d3a']} onChange={(v) => setTweak('accent', v)} />
      <TweakSection label="Полотно" />
      <TweakToggle label="Тёмная тема" value={t.dark} onChange={(v) => setTweak('dark', v)} />
    </TweaksPanel>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
