const { useState } = React;

// ── small primitives (inline, token-driven) ───────────────────────────────────
function Avatar({ initials, size = 52, light }) {
  return <span style={{ width: size, height: size, borderRadius: '50%', flexShrink: 0,
    background: light ? 'rgba(255,255,255,0.14)' : 'var(--mg-primary-900)', color: '#fff',
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
    fontWeight: 600, fontSize: Math.round(size * 0.36), letterSpacing: '-0.02em' }}>{initials}</span>;
}
function Tag({ children, sev = 'secondary', size = 'md' }) {
  const m = {
    success: ['var(--mg-status-success-bg)', 'var(--mg-status-success-text)'],
    danger: ['var(--mg-status-danger-bg)', 'var(--mg-status-danger-text)'],
    warning: ['var(--mg-status-warning-bg)', 'var(--mg-status-warning-text)'],
    info: ['var(--mg-status-info-bg)', 'var(--mg-status-info-text)'],
    primary: ['var(--mg-primary-100)', 'var(--mg-primary-900)'],
    secondary: ['rgba(255,255,255,0.14)', 'rgba(255,255,255,0.85)'],
    neutral: ['var(--c-hover)', 'var(--c-text2)']
  }[sev];
  const fs = size === 'sm' ? '11px' : '12px';
  return <span style={{ display: 'inline-flex', alignItems: 'center', gap: '4px', fontSize: fs, fontWeight: 600,
    padding: size === 'sm' ? '1px 7px' : '2px 9px', borderRadius: 'var(--mg-radius-sm)', background: m[0], color: m[1], whiteSpace: 'nowrap' }}>{children}</span>;
}
function HeaderBtn({ icon, label, primary, full, onClick }) {
  const [h, setH] = useState(false);
  return <button onClick={onClick} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
  style={{ display: full ? 'flex' : 'inline-flex', alignItems: 'center', justifyContent: full ? 'flex-start' : 'center',
    width: full ? '100%' : undefined, gap: '7px', fontFamily: 'var(--mg-font-sans)',
    fontSize: '13px', fontWeight: 600, padding: label ? '7px 12px' : '7px', borderRadius: 'var(--mg-radius-md)', cursor: 'pointer',
    color: '#fff', border: '1px solid ' + (primary ? 'transparent' : 'rgba(255,255,255,0.22)'),
    background: primary ? h ? '#3a5694' : 'var(--mg-primary-light)' : h ? 'rgba(255,255,255,0.12)' : 'transparent',
    transition: 'background .15s' }}>
    <i className={`pi ${icon}`} style={{ fontSize: '14px' }} />{label && <span>{label}</span>}
  </button>;
}

// ── KPI chip (label: value, tinted) ────────────────────────────────────────────
function KpiChip({ icon, value, label, accent }) {
  const m = {
    info: ['var(--mg-blue-100)', 'var(--mg-blue-700)'],
    brand: ['var(--mg-primary-100)', 'var(--mg-primary-900)'],
    success: ['var(--mg-green-100)', 'var(--mg-green-900)'],
    teal: ['#d4f3e8', '#0A6E4E'],
    amber: ['var(--mg-orange-100)', 'var(--mg-orange-900)'],
    danger: ['var(--mg-red-50)', 'var(--mg-red-700)'],
    neutral: ['var(--c-hover)', 'var(--c-text2)']
  }[accent] || ['var(--c-hover)', 'var(--c-text2)'];
  const [h, setH] = useState(false);
  return <span onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
  style={{ display: 'inline-flex', alignItems: 'center', gap: '7px', padding: '6px 13px', borderRadius: '999px',
    background: m[0], color: m[1], fontSize: '13px', cursor: 'default', whiteSpace: 'nowrap',
    boxShadow: h ? 'inset 0 0 0 1px ' + m[1] + '33' : 'none', transition: 'box-shadow .15s' }}>
    <i className={`pi ${icon}`} style={{ fontSize: '12px' }} />
    <span style={{ opacity: .8 }}>{label}:</span><strong style={{ fontWeight: 700 }}>{value}</strong></span>;
}

// ── Now chip ───────────────────────────────────────────────────────────────────
function NowChip({ icon, label, value, sev }) {
  // light-on-dark variant for header placement
  const m = { success: ['rgba(167,239,170,0.16)', '#bff5c0'], warning: ['rgba(141,217,255,0.16)', '#a3d5ff'],
    danger: ['rgba(255,90,68,0.18)', '#ffb0a8'], neutral: ['rgba(255,255,255,0.10)', 'rgba(255,255,255,0.8)'] }[sev];
  return <span style={{ display: 'inline-flex', alignItems: 'center', gap: '5px', padding: '3px 10px 3px 8px',
    borderRadius: '999px', fontSize: '12px', background: m[0], color: m[1] }}>
    <i className={`pi ${icon}`} style={{ fontSize: '11px' }} />
    <span style={{ opacity: .85 }}>{label}:</span><strong>{value}</strong></span>;
}

// ── Collapsible panel ──────────────────────────────────────────────────────────
function Panel({ icon, title, count, action, children, open = true }) {
  const [o, setO] = useState(open);const [h, setH] = useState(false);
  return <div style={{ borderBottom: '1px solid var(--c-border)' }}>
    <button onClick={() => setO(!o)} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
    style={{ display: 'flex', alignItems: 'center', gap: '10px', width: '100%', padding: '11px 16px',
      background: h ? 'var(--c-hover)' : 'transparent', border: 'none', cursor: 'pointer', textAlign: 'left', minHeight: '46px',
      fontFamily: 'var(--mg-font-sans)' }}>
      <span style={{ width: 26, height: 26, borderRadius: 'var(--mg-radius-sm)', background: 'var(--c-tile)',
        color: 'var(--mg-primary-900)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
        <i className={`pi ${icon}`} style={{ fontSize: '12px', color: 'var(--mg-primary-light)' }} /></span>
      <span style={{ fontSize: '14px', fontWeight: 600, color: 'var(--c-text2)' }}>{title}</span>
      {count != null && <span style={{ fontSize: '11px', fontWeight: 700, color: 'var(--c-muted)', background: 'var(--c-hover)', borderRadius: '10px', padding: '1px 8px' }}>{count}</span>}
      <span style={{ flex: 1 }} />
      {action && <span onClick={(e) => e.stopPropagation()}>{action}</span>}
      <i className={`pi ${o ? 'pi-chevron-down' : 'pi-chevron-right'}`} style={{ fontSize: '12px', color: 'var(--c-muted)' }} />
    </button>
    {o && <div style={{ padding: '4px 16px 16px' }}>{children}</div>}
  </div>;
}

function RailRow({ label, children }) {
  return <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
    <div style={{ fontSize: '11px', fontWeight: 600, color: 'var(--c-muted)', textTransform: 'uppercase', letterSpacing: '.05em' }}>{label}</div>
    <div style={{ fontSize: '13px', color: 'var(--c-text2)' }}>{children}</div>
  </div>;
}

function AddBtn({ label, onClick }) {
  const [h, setH] = useState(false);
  return <span onClick={onClick} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
  style={{ display: 'inline-flex', alignItems: 'center', gap: '5px', fontSize: '12px', fontWeight: 600,
    color: 'var(--mg-primary-light)', padding: '4px 9px', borderRadius: 'var(--mg-radius-sm)',
    background: h ? 'var(--c-tile)' : 'transparent', transition: 'background .15s', whiteSpace: 'nowrap' }}>
    <i className="pi pi-plus" style={{ fontSize: '11px' }} />{label}</span>;
}

function ChannelRow({ icon, value, kind, action, last }) {
  const [h, setH] = useState(false);
  return <div style={{ display: 'flex', alignItems: 'center', gap: '10px', padding: '7px 0',
    borderBottom: last ? 'none' : '1px solid var(--c-border)', fontSize: '13px', color: 'var(--c-text)' }}>
    <button onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)} title={action}
    style={{ width: 30, height: 30, borderRadius: '50%', flexShrink: 0, border: 'none', cursor: 'pointer',
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      background: h ? 'var(--mg-primary-900)' : 'var(--c-tile)', color: h ? '#fff' : 'var(--mg-primary-light)', transition: 'all .15s' }}>
      <i className={`pi ${icon}`} style={{ fontSize: '13px' }} /></button>
    <span style={{ flex: 1, fontWeight: 500 }}>{value}</span>
    <span style={{ fontSize: '11px', fontWeight: h ? 600 : 400, color: h ? 'var(--mg-primary-light)' : 'var(--c-muted)' }}>{h ? action : kind}</span>
    <i className="pi pi-copy" title="Скопировать" style={{ color: 'var(--c-muted)', fontSize: '12px', cursor: 'pointer' }} />
  </div>;
}

function ReqField({ label, value }) {
  const [h, setH] = useState(false);
  return <div onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)} style={{ minWidth: 0 }}>
    <div style={{ fontSize: '10px', color: 'var(--c-muted)', textTransform: 'uppercase', letterSpacing: '.04em' }}>{label}</div>
    <div style={{ display: 'flex', alignItems: 'flex-start', gap: '6px' }}>
      <span style={{ fontSize: '13px', color: 'var(--c-text)', fontWeight: 500, wordBreak: 'break-word' }}>{value}</span>
      <i className="pi pi-copy" title="Копировать" style={{ fontSize: '11px', color: 'var(--mg-primary-light)', opacity: h ? 1 : 0, cursor: 'pointer', transition: 'opacity .15s', flexShrink: 0, marginTop: '2px' }} />
    </div></div>;
}
function ReqIcon({ icon, title }) {
  const [h, setH] = useState(false);
  return <i className={`pi ${icon}`} title={title} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
  style={{ width: 26, height: 26, borderRadius: 'var(--mg-radius-sm)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
    cursor: 'pointer', fontSize: '12px', color: h ? 'var(--mg-primary-900)' : 'var(--c-muted)', background: h ? 'var(--c-tile)' : 'transparent', transition: 'all .15s' }} />;
}
function RequisiteCard({ name, primary, fields, last }) {
  return <div style={{ border: '1px solid var(--c-border)', borderRadius: 'var(--mg-radius-md)', padding: '12px 14px',
    marginBottom: last ? 0 : '10px', background: 'var(--c-card)' }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '11px' }}>
      <span style={{ width: 24, height: 24, borderRadius: 'var(--mg-radius-sm)', background: 'var(--c-tile)', color: 'var(--mg-primary-light)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
        <i className="pi pi-id-card" style={{ fontSize: '12px' }} /></span>
      <span style={{ fontWeight: 600, fontSize: '13px', color: 'var(--c-text)' }}>{name}</span>
      {primary && <Tag sev="primary" size="sm">Основной</Tag>}
      <span style={{ flex: 1 }} />
      <ReqIcon icon="pi-copy" title="Копировать реквизиты" />
      <ReqIcon icon="pi-pencil" title="Редактировать" />
    </div>
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px 20px' }}>
      {fields.map((f, i) => <ReqField key={i} label={f[0]} value={f[1]} />)}
    </div></div>;
}

// ── panel body samples ──────────────────────────────────────────────────────────
function PanelBody({ kind }) {

      </div>)}

          <span style={{ color: 'var(--c-muted)' }}> · {e[2]}</span></span>
        {e[3] && <Tag sev="primary" size="sm">Контактное лицо</Tag>}</div>)}
  </div>;

    { name: 'ТОО «Ромашка»', primary: true, fields: [['БИН', '123456789012'], ['Форма', 'ТОО'], ['Директор', 'Б. Меркулов'], ['Банк', 'Kaspi Bank'], ['Счёт', 'KZ12 3456 7890 1234'], ['КБе', '17']] },
    { name: 'ИП Меркулов Б.А.', primary: false, fields: [['ИИН', '870101300123'], ['Форма', 'ИП'], ['Банк', 'Halyk Bank'], ['Счёт', 'KZ98 7654 3210 5678']] }];

    return <div>{reqs.map((r, i) => <RequisiteCard key={i} {...r} last={i === reqs.length - 1} />)}</div>;
  }

    <div key={i} style={{ padding: '8px 0', borderBottom: i < 1 ? '1px solid var(--c-border)' : 'none' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '13px', marginBottom: '5px' }}>
          <span style={{ fontWeight: 500, color: 'var(--c-text)' }}>{p[0]}</span><span style={{ color: 'var(--c-muted)' }}>{p[1]}</span></div>
        <div style={{ height: '6px', borderRadius: '3px', background: 'var(--c-hover)', overflow: 'hidden' }}>
          <div style={{ width: p[2] + '%', height: '100%', background: p[3] }} /></div></div>)}

  if (kind === 'rel') return <div style={{ ...row, borderBottom: 'none' }}>

  return <div className={'surface' + (dark ? ' dark' : '')} style={vars}>
    <div style={{ display: 'flex', alignItems: 'center', gap: '14px', padding: '14px 28px', background: 'var(--mg-primary-950)', position: 'sticky', top: 0, zIndex: 5 }}>
      <span style={{ color: '#fff', fontWeight: 700, fontSize: '14px', letterSpacing: '-0.01em' }}>Редизайн карточки</span>
      <div style={{ display: 'inline-flex', gap: '2px', background: 'rgba(255,255,255,0.08)', borderRadius: '8px', padding: '3px' }}>
        <Seg v="contact" label="Контакт (физлицо)" icon="pi-user" />
        <Seg v="company" label="Компания" icon="pi-building" />
      </div>
      <span style={{ flex: 1 }} />
      <button onClick={() => setTweak('dark', !dark)} style={{ display: 'inline-flex', alignItems: 'center', gap: '7px',
        fontSize: '13px', fontWeight: 600, padding: '7px 14px', borderRadius: '6px', cursor: 'pointer',
        border: '1px solid rgba(255,255,255,0.22)', background: 'transparent', color: '#fff' }}>
        <i className={`pi ${dark ? 'pi-sun' : 'pi-moon'}`} style={{ fontSize: '14px' }} />{dark ? 'Светлая' : 'Тёмная'}</button>
    </div>
    <div style={{ padding: '28px', maxWidth: '1140px', margin: '0 auto' }}>
      <EntityCard d={DATA[which]} key={which} />
    </div>
    <TweaksPanel title="Tweaks">
      <TweakSection label="Бренд" />
      <TweakColor label="Акцент" value={t.accent} options={['#172747', '#2b2f36', '#312e81', '#0f4d3a']} onChange={(v) => setTweak('accent', v)} />
      <TweakSection label="Форма" />
      <TweakRadio label="Скругление" value={t.shape} options={['Острые', 'Скруглённые', 'Мягкие']} onChange={(v) => setTweak('shape', v)} />
      <TweakSection label="Полотно" />
      <TweakRadio label="Фон" value={t.mood} options={['Прохладный', 'Тёплый', 'Брендовый']} onChange={(v) => setTweak('mood', v)} />
      <TweakToggle label="Тёмная тема" value={t.dark} onChange={(v) => setTweak('dark', v)} />
    </TweaksPanel>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
