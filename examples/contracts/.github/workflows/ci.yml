name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:

jobs:
  api-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint api
        working-directory: apps/api
        run: ruff check . || true

  api-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install api (dev)
        working-directory: apps/api
        run: pip install -e ".[dev]"
      - name: pytest
        working-directory: apps/api
        run: pytest -q

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        working-directory: apps/web
        run: npm install --no-audit --no-fund
      - name: Build
        working-directory: apps/web
        run: npm run build
