# Product Pack: MACRO (ERP-suite)
# Используется генератором при создании сублицензионного договора на MACRO suite:
# MacroERP + MacroTender + MacroPlan
#
# ВНИМАНИЕ: до начала использования с клиентами в продакшене необходимо
# подтвердить с юристами актуальную цепочку прав на эти продукты после
# закрытия ERP Solutions KZ.

name: "MACRO"

# === Цепочка прав ===
# MACRO - это suite из нескольких продуктов, у каждого может быть свой правообладатель
has_multiple_copyright_holders: true
copyright_holders:
  - name: "_____________ (ТРЕБУЕТ УТОЧНЕНИЯ)"
    products: ["MacroERP"]
    jurisdiction: "_____"
    license_agreement_number: "_____"
    license_agreement_date: "__.__.____"
  - name: "_____________ (ТРЕБУЕТ УТОЧНЕНИЯ)"
    products: ["MacroTender"]
    jurisdiction: "_____"
    license_agreement_number: "_____"
    license_agreement_date: "__.__.____"
  - name: "_____________ (ТРЕБУЕТ УТОЧНЕНИЯ)"
    products: ["MacroPlan"]
    jurisdiction: "_____"
    license_agreement_number: "_____"
    license_agreement_date: "__.__.____"

# === Товарный знак ===
tm_info: null  # для MACRO в текущих шаблонах ТМ не указан

# === Параметры внедрения ===
implementation_weeks: 24          # ERP занимает дольше чем CRM
training_hours_default: 35        # больше обучения
training_hours_per_module: 7      # формула: 1 модуль = 7 чел/час

# === Feature flags ===
has_data_archive_clause: true     # ERP-данные критичны - архив обязателен
has_premium_support_option: true

# === Модули для Приложения 1 ===
modules_table:
  - name: "MacroERP"
    modules:
      - name: "ГПР (Строительные проекты)"
        status: "—"
      - name: "Документооборот"
        status: "—"
      - name: "Снабжение и движение ТМЦ"
        status: "—"
      - name: "Управление финансами"
        status: "—"
      - name: "Количество учётных записей"
        status: "—"
      - name: "Стандартная техподдержка"
        status: "—"
  - name: "MacroTender"
    modules:
      - name: "Обработка тендерной информации"
        status: "—"
      - name: "Тендерная площадка на сайте компании"
        status: "—"
  - name: "MacroPlan"
    modules:
      - name: "Работа с задачами и поручениями"
        status: "—"

# === Бриф для ERP-продуктов отличается от CRM/Sales ===
# Здесь акцент на строительные операции, а не на продажи
brief_fields:
  - id: "4.1"
    label: "Регион(ы) деятельности организации"
  - id: "4.2"
    label: "Род деятельности компании (дороги, пром. строительство, жилое, ИЖС)"
  - id: "4.3"
    label: "Роль организации (заказчик, застройщик, генподрядчик, субподрядчик)"
  - id: "4.4"
    label: "Общая площадь объектов в строительстве"
  - id: "4.5"
    label: "Количество объектов и % их строительной готовности"
  - id: "4.6"
    label: "Количество потенциальных пользователей системы"
  - id: "4.7"
    label: "Создание ГПР осуществляется в программе"
  - id: "4.8"
    label: "Ведение ГПР осуществляется в программе"
  - id: "4.9"
    label: "Строительный контроль ведётся в программе"
  - id: "4.10"
    label: "Наличие планов снабжения (да/нет)"
  - id: "4.11"
    label: "На основании чего формируется план снабжения"
  - id: "4.12"
    label: "Формат смет/коммерческих калькуляций"
  - id: "4.13"
    label: "Тендеры организованы в программе"
  - id: "4.14"
    label: "Согласование договоров в программе"
  - id: "4.15"
    label: "Согласование закрывающих документов в программе"
  - id: "4.16"
    label: "Работа отдела снабжения в программе"
  - id: "4.17"
    label: "Платежный календарь и счета на оплату в программе"
  - id: "4.18"
    label: "Управленческие отчёты в программе"
  - id: "4.19"
    label: "Работа с задачами и поручениями в программе"

# === Технические параметры настройки ===
tech_fields:
  - id: "5.1"
    label: "Формат использования системы"
    default: "Облачное решение"
  - id: "5.2"
    label: "Количество вносимых домов в систему и % строительной готовности"
    note: "% строительной готовности дома для внесения в систему должен быть более 30%"
  - id: "5.3"
    label: "Общее количество Договоров, вносимых в систему"
  - id: "5.4"
    label: "Количество часов обучений пользователей"
    default: "до 35 чел/часов (формула: 1 модуль = 7 чел/час)"
