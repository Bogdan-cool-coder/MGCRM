networks:
  vizion-network:
    driver: bridge

services:
  app:
    image: ghcr.io/skorpyone/vizion-app:${IMAGE_TAG:-dev-latest}
    container_name: ${COMPOSE_PROJECT_NAME}-app
    env_file:
      - .env
    environment:
      GOTENBERG_URL: http://gotenberg:3000
    volumes:
      # Named volumes for runtime-writable directories (survive container recreate)
      - storage_app:/var/www/html/storage/app
      - storage_framework:/var/www/html/storage/framework
      - storage_logs:/var/www/html/storage/logs
      - bootstrap_cache:/var/www/html/bootstrap/cache
      # Backups target (bind to host path so backups survive image updates)
      - ./data/backups:/var/www/backups
      # Share public/ with nginx so nginx can serve favicon.ico, robots.txt etc.
      - app_public:/var/www/html/public
    networks:
      - vizion-network
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: ${COMPOSE_PROJECT_NAME}-nginx
    restart: unless-stopped
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-2020}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Read-only access to public/ for favicon, robots.txt (no src bind mount)
      - app_public:/var/www/html/public:ro
    networks:
      - vizion-network
    depends_on:
      - app

  frontend:
    image: ghcr.io/skorpyone/vizion-frontend:${IMAGE_TAG:-dev-latest}
    container_name: ${COMPOSE_PROJECT_NAME}-frontend
    ports:
      - "${APP_BIND:-127.0.0.1}:${FRONTEND_PORT:-3030}:5173"
    networks:
      - vizion-network
    depends_on:
      - app

  queue-worker:
    image: ghcr.io/skorpyone/vizion-app:${IMAGE_TAG:-dev-latest}
    container_name: ${COMPOSE_PROJECT_NAME}-queue-worker
    command: php artisan queue:work --queue=ai-chat,default --tries=1 --timeout=600 --max-jobs=50 --memory=256 --sleep=1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GOTENBERG_URL: http://gotenberg:3000
    volumes:
      # Same named volumes as app — worker shares storage/logs, storage/framework/cache
      - storage_app:/var/www/html/storage/app
      - storage_framework:/var/www/html/storage/framework
      - storage_logs:/var/www/html/storage/logs
      - bootstrap_cache:/var/www/html/bootstrap/cache
      - ./data/backups:/var/www/backups
    networks:
      - vizion-network
    depends_on:
      - postgres
      - app

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: ${COMPOSE_PROJECT_NAME}-gotenberg
    restart: unless-stopped
    networks:
      - vizion-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-postgres
    ports:
      - "${APP_BIND:-127.0.0.1}:${POSTGRES_HOST_PORT:-5420}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vizion-network

volumes:
  postgres_data:
  storage_app:
  storage_framework:
  storage_logs:
  bootstrap_cache:
  app_public:
