name: Build and Push

on:
  workflow_call:

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      branch: ${{ steps.meta.outputs.branch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine image tags
        id: meta
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "master" ]; then
            PREFIX="prod"
          else
            PREFIX="dev"
          fi
          echo "tag=${PREFIX}-latest" >> $GITHUB_OUTPUT
          echo "tag_sha=${PREFIX}-${SHA}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "prefix=${PREFIX}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- App image (PHP-FPM + Laravel source + vendor) ---
      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/php/Dockerfile
          push: true
          tags: |
            ghcr.io/skorpyone/vizion-app:${{ steps.meta.outputs.tag }}
            ghcr.io/skorpyone/vizion-app:${{ steps.meta.outputs.tag_sha }}
          cache-from: type=gha,scope=app-${{ steps.meta.outputs.prefix }}
          cache-to: type=gha,scope=app-${{ steps.meta.outputs.prefix }},mode=max

      # --- Frontend image (Vite build → nginx static) ---
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          target: production
          push: true
          # Documents section is hidden on dev / prod until Gotenberg is
          # provisioned there. The flag is build-time (Vite-inlined); the local
          # owner stack rebuild omits this arg, so Documents stays visible there.
          build-args: |
            VITE_FEATURE_DOCUMENTS=false
          tags: |
            ghcr.io/skorpyone/vizion-frontend:${{ steps.meta.outputs.tag }}
            ghcr.io/skorpyone/vizion-frontend:${{ steps.meta.outputs.tag_sha }}
          cache-from: type=gha,scope=frontend-${{ steps.meta.outputs.prefix }}
          cache-to: type=gha,scope=frontend-${{ steps.meta.outputs.prefix }},mode=max
