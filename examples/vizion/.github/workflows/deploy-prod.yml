name: Deploy Prod

# Runs after Build and Push succeeds on master branch.
# Relies on the images already being in GHCR (pushed by build-and-push.yml).
#
# IMPORTANT: GitHub secret values that must point to the NEW server (108.174.78.146):
#   NEW_SERVER_HOST     — 108.174.78.146
#   NEW_SERVER_USER     — skorpyone
#   NEW_SERVER_SSH_KEY  — contents of ~/.ssh/vps_key (private key for new server)
# Update these in GitHub → Settings → Secrets → Actions before the first push.
#
# NOTE: db:seed is NOT run automatically on prod to prevent data loss.
# For first-time bootstrap, run seeds manually via ssh after deploy:
#   docker compose exec -T app php artisan db:seed --force
#   docker compose exec -T app php artisan db:seed --class=ClientsSeeder --force

on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  build-and-push:
    uses: ./.github/workflows/build-and-push.yml
    permissions:
      packages: write
      contents: read

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to prod server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NEW_SERVER_HOST }}
          username: ${{ secrets.NEW_SERVER_USER }}
          key: ${{ secrets.NEW_SERVER_SSH_KEY }}
          script: |
            set -euxo pipefail
            cd ~/vizion/prod

            # Pull latest images from GHCR
            docker compose pull

            # Recreate containers with new images
            docker compose up -d --no-build

            # Wait for postgres to be ready before running migrations
            for i in $(seq 1 30); do
              docker compose exec -T postgres pg_isready -U vizion && break
              echo "Waiting for postgres... ($i/30)"
              sleep 2
            done

            # Run migrations
            docker compose exec -T app php artisan migrate --force

            # Laravel production optimisations
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:cache

            # Ensure host nginx timeout config is in place for AI streaming (long requests)
            sudo tee /etc/nginx/conf.d/vizion-timeouts.conf <<< 'proxy_read_timeout 480s; proxy_send_timeout 480s; client_body_timeout 480s; client_header_timeout 480s; send_timeout 480s;'
            sudo nginx -t && sudo systemctl reload nginx
