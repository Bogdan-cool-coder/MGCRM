# Host nginx vhost for PROD environment
# Ports: API :2021, Frontend :3031
#
# Certbot will append SSL blocks automatically on first run:
#   sudo certbot --nginx -d vizion.macroglobal.tech
# After that this file will have listen 443 ssl + certificate paths.

server {
    listen 80;
    server_name vizion.macroglobal.tech;

    # AI chat requests can legitimately take 5+ minutes (probe + report generation).
    proxy_read_timeout  480s;
    proxy_send_timeout  480s;
    proxy_connect_timeout 60s;

    # API requests go to the containerised nginx (which forwards to PHP-FPM)
    location /api/ {
        proxy_pass         http://127.0.0.1:2021/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # Sanctum CSRF cookie endpoint
    location /sanctum/ {
        proxy_pass         http://127.0.0.1:2021/sanctum/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # All other requests → Vue frontend (nginx in frontend container)
    location / {
        proxy_pass         http://127.0.0.1:3031;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
