server {
    listen 5173;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SSE streams — proxy_buffering must be off or the client never receives events
    # until the buffer fills. This regex location takes priority over the /api
    # prefix location below (regex beats prefix in nginx selection order).
    location ~ ^/api/chats/[0-9]+/stream {
        proxy_pass http://nginx:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
    }

    # API requests → backend nginx
    location /api {
        proxy_pass http://nginx:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI chat cascade (probe_data → create_report) plus retries can run 5+ min.
        # Default proxy_read_timeout is 60s — that was the source of the 504 from
        # vizion.lazarewww.ru on long AI requests. Align with backend nginx
        # (default.conf) and fastcgi timeouts (600s).
        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /favicon.ico { access_log off; log_not_found off; }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
