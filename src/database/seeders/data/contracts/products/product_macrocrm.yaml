# Product Pack: MacroCRM
# Используется генератором при создании сублицензионного договора на MacroCRM.

name: "MacroCRM"

# === Цепочка прав ===
has_multiple_copyright_holders: false
copyright_holder:
  name: 'ООО "Айти-Сервис"'
  jurisdiction: "РФ"  # ВНИМАНИЕ: уточнить актуальную юрисдикцию правообладателя
  license_agreement_number: "_____"  # ЗАПОЛНИТЬ из реального лицензионного договора
  license_agreement_date: "__.__.____"  # ЗАПОЛНИТЬ

# === Товарный знак ===
# null если ТМ для этого продукта не упоминается в договоре
tm_info: null

# === Параметры внедрения ===
implementation_weeks: 12          # стандарт для CRM
training_hours_default: 15        # человеко-часов
training_hours_per_module: null   # не считается по модулям

# === Feature flags ===
has_data_archive_clause: true     # клиенты MacroCRM хранят большие БД клиентов — нужна выгрузка
has_premium_support_option: true  # есть опция премиального сопровождения

# === Модули для Приложения 1 ===
modules_table:
  - name: "MacroCRM"
    modules:
      - name: "Управление заявками покупателей"
        status: "подключено"
      - name: "Управление ассортиментом недвижимости"
        status: "подключено"
      - name: "Управление сделками"
        status: "подключено"
      - name: "Колл-центр"
        status: "подключено"
      - name: "API для маркетинговых интеграций"
        status: "—"
      - name: "Количество учётных записей"
        status: "до 10"
      - name: "Стандартная техподдержка"
        status: "подключено"
      - name: "Премиальное сопровождение"
        status: "—"

