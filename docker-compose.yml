networks:
  macro-crm-network:
    driver: bridge
  # External Traefik network — name is server-specific, set TRAEFIK_NETWORK in root .env
  traefik-public:
    name: ${TRAEFIK_NETWORK:-traefik-public}
    external: true

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
    image: macro-crm-app:${IMAGE_TAG:-dev-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-macro-crm}-app
    restart: unless-stopped
    env_file:
      - src/.env
    environment:
      GOTENBERG_URL: http://gotenberg:3000
    volumes:
      # Named volumes for runtime-writable directories (survive container recreate)
      - storage_app:/var/www/html/storage/app
      - storage_framework:/var/www/html/storage/framework
      - storage_logs:/var/www/html/storage/logs
      - bootstrap_cache:/var/www/html/bootstrap/cache
      # Backups target (bind to host path so backups survive image updates)
      - ./data/backups:/var/www/backups
      # Share public/ with nginx so nginx can serve favicon.ico, robots.txt etc.
      - app_public:/var/www/html/public
    networks:
      - macro-crm-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # nginx — serves Laravel public/ static assets + proxies PHP-FPM (app:9000).
  # Internal to macro-crm-network; NOT exposed to host. Only the frontend
  # container (and Traefik via it) reaches nginx.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: ${COMPOSE_PROJECT_NAME:-macro-crm}-nginx
    restart: unless-stopped
    # Bind to loopback only — prevents port conflicts with other VPS services.
    # In prod the Traefik → frontend → nginx chain handles all HTTP traffic;
    # this host port is for direct health-checks / debug only.
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Read-only access to public/ for favicon, robots.txt (no src bind mount)
      - app_public:/var/www/html/public:ro
    networks:
      - macro-crm-network
    depends_on:
      - app

  # ---------------------------------------------------------------------------
  # frontend — nginx:alpine serving the compiled Vue 3 SPA.
  #   - Serves /usr/share/nginx/html (Vite dist) with history-mode fallback.
  #   - Proxies /api/* → nginx:80 (backend nginx → php-fpm).
  #   - Exposed to Traefik via the shared traefik-public network.
  #   - Host port ${FRONTEND_PORT} bound to loopback for local dev/smoke only.
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: production
    image: macro-crm-frontend:${IMAGE_TAG:-dev-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-macro-crm}-frontend
    restart: unless-stopped
    # Loopback binding — Traefik reaches this via traefik-public network, not the host port.
    ports:
      - "${APP_BIND:-127.0.0.1}:${FRONTEND_PORT:-3000}:80"
    networks:
      - macro-crm-network
      - traefik-public
    depends_on:
      - nginx
    labels:
      - "traefik.enable=true"
      # Router — HTTPS on the configured domain
      - "traefik.http.routers.macro-crm.rule=Host(`${APP_DOMAIN:-mgcrm.macroglobal.tech}`)"
      - "traefik.http.routers.macro-crm.entrypoints=websecure"
      - "traefik.http.routers.macro-crm.tls=true"
      - "traefik.http.routers.macro-crm.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      # Tell Traefik which internal port to use (container listens on :80)
      - "traefik.http.services.macro-crm.loadbalancer.server.port=80"
      # HTTP → HTTPS redirect (if Traefik has a web entrypoint)
      - "traefik.http.routers.macro-crm-http.rule=Host(`${APP_DOMAIN:-mgcrm.macroglobal.tech}`)"
      - "traefik.http.routers.macro-crm-http.entrypoints=web"
      - "traefik.http.routers.macro-crm-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"

  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
    image: macro-crm-app:${IMAGE_TAG:-dev-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-macro-crm}-queue-worker
    # Queue priority: default first (user-facing jobs) then automation (background scans).
    # Both queues are served by a single worker — no starvation risk at current load.
    # If automation jobs grow significantly, extract a dedicated automation-worker service.
    command: php artisan queue:work --queue=default,automation --tries=1 --timeout=600 --max-jobs=50 --memory=256 --sleep=1
    restart: unless-stopped
    env_file:
      - src/.env
    environment:
      GOTENBERG_URL: http://gotenberg:3000
    volumes:
      # Same named volumes as app — worker shares storage/logs, storage/framework/cache
      - storage_app:/var/www/html/storage/app
      - storage_framework:/var/www/html/storage/framework
      - storage_logs:/var/www/html/storage/logs
      - bootstrap_cache:/var/www/html/bootstrap/cache
      - ./data/backups:/var/www/backups
    networks:
      - macro-crm-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Scheduler — runs `php artisan schedule:work` to fire all registered crons.
  #
  # M7 automation commands that run hourly via this service:
  #   automation:scan-idle        — triggers idle-deal automations
  #   automation:scan-date-field  — triggers date-field automations
  #
  # SINGLE process: schedule:work polls every 60s internally. DO NOT scale.
  # ---------------------------------------------------------------------------
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
    image: macro-crm-app:${IMAGE_TAG:-dev-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-macro-crm}-scheduler
    command: php artisan schedule:work
    restart: unless-stopped
    env_file:
      - src/.env
    environment:
      GOTENBERG_URL: http://gotenberg:3000
    volumes:
      - storage_app:/var/www/html/storage/app
      - storage_framework:/var/www/html/storage/framework
      - storage_logs:/var/www/html/storage/logs
      - bootstrap_cache:/var/www/html/bootstrap/cache
      - ./data/backups:/var/www/backups
    networks:
      - macro-crm-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Telegram bot — long-polling in a SINGLE process.
  #
  # CRITICAL: replicas:1 — this service must NEVER be scaled. A parallel
  # getUpdates from a second process triggers Telegram 409 Conflict and drops
  # updates. RUN_TELEGRAM_POLLING=true is set ONLY here; `app` and `queue-worker`
  # do not poll (they resolve the same bot singleton purely as an outgoing Bot
  # API client). Deploy note: this service restarts on its OWN — it is NOT part
  # of the rolling restart of the web/queue replicas:
  #   docker compose up -d --force-recreate bot
  # ---------------------------------------------------------------------------
  bot:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
    image: macro-crm-app:${IMAGE_TAG:-dev-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-macro-crm}-bot
    command: php artisan nutgram:run
    restart: unless-stopped
    env_file:
      - src/.env
    environment:
      RUN_TELEGRAM_POLLING: "true"
    volumes:
      - storage_app:/var/www/html/storage/app
      - storage_framework:/var/www/html/storage/framework
      - storage_logs:/var/www/html/storage/logs
      - bootstrap_cache:/var/www/html/bootstrap/cache
    networks:
      - macro-crm-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: ${COMPOSE_PROJECT_NAME:-macro-crm}-gotenberg
    restart: unless-stopped
    networks:
      - macro-crm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-macro-crm}-postgres
    restart: unless-stopped
    # Bind to loopback only — prevents port conflicts with other VPS services
    # and avoids exposing the DB to the public interface.
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-macro_crm}
      POSTGRES_USER: ${DB_USERNAME:-macro_crm}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - macro-crm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-macro_crm} -d ${DB_DATABASE:-macro_crm}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-macro-crm}-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    # Bind to loopback only
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - macro-crm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
  redis_data:
  storage_app:
  storage_framework:
  storage_logs:
  bootstrap_cache:
  app_public:
